# =============================================================================
# Intelligence Secrets — placeholder for sealed secrets
# =============================================================================
#
# In production, replace with SealedSecret or ExternalSecret pointing to
# AWS Secrets Manager. Never commit real credentials.
#
# Usage:
#   kubectl apply -f secrets.yml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: intelligence-secrets
  namespace: intelligence
  labels:
    app.kubernetes.io/part-of: gtcx
type: Opaque
stringData:
  anthropic-api-key: 'REPLACE_WITH_REAL_KEY'
  comply-advantage-api-key: 'REPLACE_WITH_REAL_KEY'
  database-url: 'postgres://gtcx:REPLACE@postgres.default:5432/gtcx_development'
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligence-sa
  namespace: intelligence
  labels:
    app.kubernetes.io/part-of: gtcx
