# =============================================================================
# compliance-os-staging — Kustomize overlay
# =============================================================================
# Provides namespace + ExternalSecrets for GHCR pull token and non-W2 secrets.
# Apply: kubectl apply -k infra/kubernetes/overlays/staging/compliance-os/
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: compliance-os-staging

resources:
  - namespace.yaml
  - secret-store.yaml
  - external-secrets.yaml
