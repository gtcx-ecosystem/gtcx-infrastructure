# =============================================================================
# compliance-os-staging — External Secrets
# =============================================================================
# Ask 1: GHCR imagePullSecret (dockerconfigjson)
# Ask 2: Non-W2 staging secrets (compliance-api, caas, core12, via, vxa, minio)
#
# All secrets sync from AWS Secrets Manager (af-south-1) via ESO.
# No plaintext values in git.
#
# Prerequisites (operator):
#   1. `terraform apply` module.secrets (compliance-os.tf) — IRSA role + empty SM shells.
#   2. Populate AWS SM secret values (witness doc).
#   3. SecretStore `compliance-os-aws-secrets` + SA `compliance-os-sa` (secret-store.yaml).
# =============================================================================

---
# Ask 1 — GHCR pull token for ghcr.io/gtcx-ecosystem/compliance-web
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: compliance-os-ghcr-pull
  namespace: compliance-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: compliance-os-aws-secrets
  target:
    name: compliance-os-ghcr-pull
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .dockerconfigjson }}'
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: gtcx/compliance-os/staging/ghcr-pull-token
        property: dockerconfigjson

---
# Ask 2 — compliance-api-secrets
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: compliance-api-secrets
  namespace: compliance-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: compliance-os-aws-secrets
  target:
    name: compliance-api-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/compliance-os/staging/compliance-api

