# =============================================================================
# Staging Overlay
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gtcx-staging

resources:
  - ../../base

nameSuffix: -staging

commonLabels:
  environment: staging

configMapGenerator:
  - name: gtcx-env
    behavior: merge
    literals:
      - GTCX_LOG_LEVEL=info
      - RAILS_ENV=staging

# Secrets from external secret manager in staging
# secretGenerator configured via GitOps pipeline

images:
  - name: gtcx/api
    newTag: staging
  - name: gtcx/crypto
    newTag: staging

# Staging resource limits (moderate)
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "384Mi"
    target:
      kind: Deployment
      name: gtcx-api
