# =============================================================================
# Intelligence Secrets — ExternalSecret (AWS Secrets Manager)
# =============================================================================
#
# Replaces plaintext K8s Secret. Requires external-secrets operator installed
# in the cluster and a SecretStore configured for AWS Secrets Manager.
#
# AWS Secrets Manager path: gtcx/intelligence/<key>
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: intelligence-secrets
  namespace: intelligence
  labels:
    app.kubernetes.io/part-of: gtcx
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: intelligence-secrets
    creationPolicy: Owner
  data:
    - secretKey: anthropic-api-key
      remoteRef:
        key: gtcx/intelligence/anthropic-api-key
    - secretKey: comply-advantage-api-key
      remoteRef:
        key: gtcx/intelligence/comply-advantage-api-key
    - secretKey: database-url
      remoteRef:
        key: gtcx/intelligence/database-url
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: intelligence-sa
  namespace: intelligence
  labels:
    app.kubernetes.io/part-of: gtcx
