# =============================================================================
# compliance-os-production — External Secrets (Hub #17 Phase B)
# =============================================================================
# W2 bundle → K8s secret compliance-os-w2-secrets (web pod envFrom).
# GHCR pull token for compliance-web image.
# =============================================================================

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: compliance-os-w2-secrets
  namespace: compliance-os-production
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: production
    hub-blocker: '17'
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: compliance-os-aws-secrets
  target:
    name: compliance-os-w2-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/compliance-os/production/w2

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: compliance-os-ghcr-pull
  namespace: compliance-os-production
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: production
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: compliance-os-aws-secrets
  target:
    name: compliance-os-ghcr-pull
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{{ .dockerconfigjson }}'
  data:
    - secretKey: dockerconfigjson
      remoteRef:
        key: gtcx/compliance-os/production/ghcr-pull-token
        property: dockerconfigjson
