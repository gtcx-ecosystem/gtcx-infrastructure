# =============================================================================
# compliance-os-production — ESO SecretStore + IRSA ServiceAccount
# =============================================================================
# Prerequisite: terraform module.secrets (compliance-os.tf) for production:
#   arn:aws:iam::348389439381:role/gtcx-production-compliance-os-secrets-role
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compliance-os-sa
  namespace: compliance-os-production
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: production
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-production-compliance-os-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: compliance-os-aws-secrets
  namespace: compliance-os-production
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: compliance-os-sa
