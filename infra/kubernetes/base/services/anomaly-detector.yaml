apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-detector
  namespace: gtcx
  labels:
    app: anomaly-detector
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-detector
  template:
    metadata:
      labels:
        app: anomaly-detector
        version: v1
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: detector
          image: '348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-anomaly-detector:latest'
          imagePullPolicy: Always
          env:
            - name: PROMETHEUS_URL
              value: 'http://prometheus.monitoring.svc.cluster.local:9090'
            - name: NODE_ENV
              value: 'production'
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '128Mi'
              cpu: '100m'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - 'process.exit(0)'
            initialDelaySeconds: 30
            periodSeconds: 60
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - 'process.exit(0)'
            initialDelaySeconds: 5
            periodSeconds: 10
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - anomaly-detector
                topologyKey: kubernetes.io/hostname
