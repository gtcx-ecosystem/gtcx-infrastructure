# =============================================================================
# Replay Guard — External Secret for Redis Credentials
# =============================================================================
# Uses External Secrets Operator to sync Redis URL from AWS Secrets Manager.
# Never commit plaintext secrets to Git.
#
# Principles: SECURE (P11)
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gtcx-replay-guard-redis
  namespace: gtcx
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: gtcx-aws-secrets-manager
  target:
    name: gtcx-replay-guard-redis
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        url: '{{ .redisUrl }}'
  data:
    - secretKey: redisUrl
      remoteRef:
        key: gtcx/production/redis/replay-guard
        property: url
