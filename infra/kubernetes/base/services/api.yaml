# =============================================================================
# GTCX API Service (Rails)
# =============================================================================
# Core API gateway for all GTCX operations
# Principles: SECURE (11), RESILIENT (12), OBSERVABLE (15), SCALABLE (24)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-api
  namespace: gtcx
  labels:
    app: gtcx-api
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gtcx-api
  template:
    metadata:
      labels:
        app: gtcx-api
        tier: api
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: gtcx-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: gtcx/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gtcx-base-config
            - configMapRef:
                name: gtcx-env
            - secretRef:
                name: gtcx-secrets
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '1Gi'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /app/tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: gtcx-api
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: gtcx-api
  namespace: gtcx
  labels:
    app: gtcx-api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: gtcx-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gtcx-api
  namespace: gtcx
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gtcx-api
  namespace: gtcx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gtcx-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gtcx-api
  namespace: gtcx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gtcx-api
