# =============================================================================
# GTCX AGX Service (NestJS — Authenticated Global Exchange)
# =============================================================================
# Primary platform API for GTCX operations
# Principles: SECURE (11), RESILIENT (12), OBSERVABLE (15), SCALABLE (24)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-agx
  namespace: gtcx
  labels:
    app: gtcx-agx
    tier: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gtcx-agx
  template:
    metadata:
      labels:
        app: gtcx-agx
        tier: platform
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: gtcx-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: agx
          image: gtcx/agx:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gtcx-base-config
            - configMapRef:
                name: gtcx-env
            - secretRef:
                name: gtcx-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: gtcx-agx
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: gtcx-agx
  namespace: gtcx
  labels:
    app: gtcx-agx
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  selector:
    app: gtcx-agx
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gtcx-agx
  namespace: gtcx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gtcx-agx
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gtcx-agx
  namespace: gtcx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gtcx-agx
