apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-gateway
  namespace: gtcx
  labels:
    app: compliance-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance-gateway
  template:
    metadata:
      labels:
        app: compliance-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compliance-gateway
          image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/compliance-gateway:6d1410c-amd64
          ports:
            - name: http
              containerPort: 8500
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '8500'
            - name: PROTOCOL_BASE_URL
              value: 'http://gtcx-protocols.gtcx.svc.cluster.local:8300'
            - name: MODEL
              value: 'claude-sonnet-4-20250514'
            - name: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: GOOGLE_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: GROQ_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: BASELINE_COST_ROUTER
              value: '1'
            # Runtime policy overrides from ConfigMap
            - name: GTCX_DEGRADATION_MODE
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_DEGRADATION_MODE
            - name: GTCX_LBW_STRIP_FIELDS
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_STRIP_FIELDS
            - name: GTCX_LBW_COMPRESSION
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_COMPRESSION
            - name: GTCX_LBW_CACHE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_CACHE_SECONDS
            - name: GTCX_FEATURE_SIGNED_AUDIT
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_FEATURE_SIGNED_AUDIT
            - name: GTCX_FEATURE_FEEDBACK_LOOP
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_FEATURE_FEEDBACK_LOOP
            # Audit sink — durable publish of signed records via NATS JetStream.
            - name: AUDIT_SINK
              value: 'nats'
            - name: AUDIT_NATS_SUBJECT
              value: 'gtcx.audit.compliance-gateway'
            - name: NATS_URL
              value: 'nats://nats.gtcx.svc.cluster.local:4222'
            # In-memory chain ceiling. The full chain lives in the sink;
            # records roll over to a checkpoint hash beyond this count.
            - name: AUDIT_CHAIN_MAX_RECORDS
              value: '10000'
            # Audit signing key. Mounted from a sealed Secret per overlay.
            # In production the gateway exits 78 (EX_CONFIG) if absent.
            - name: AUDIT_SIGNING_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-audit-key
                  key: AUDIT_SIGNING_KEY_B64
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-gateway
  namespace: gtcx
  labels:
    app: compliance-gateway
spec:
  selector:
    app: compliance-gateway
  ports:
    - name: http
      port: 8500
      targetPort: 8500
  type: ClusterIP
