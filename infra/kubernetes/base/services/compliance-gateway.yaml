apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-gateway
  namespace: gtcx
  labels:
    app: compliance-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance-gateway
  template:
    metadata:
      labels:
        app: compliance-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: compliance-gateway
          image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/compliance-gateway:6d1410c
          ports:
            - name: http
              containerPort: 8500
              protocol: TCP
          env:
            - name: NODE_ENV
              value: 'production'
            - name: PORT
              value: '8500'
            - name: PROTOCOL_BASE_URL
              value: 'http://gtcx-protocols.gtcx.svc.cluster.local:8300'
            - name: MODEL
              value: 'claude-sonnet-4-20250514'
            - name: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: compliance-gateway-secrets
                  key: ANTHROPIC_API_KEY
            # Runtime policy overrides from ConfigMap
            - name: GTCX_DEGRADATION_MODE
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_DEGRADATION_MODE
            - name: GTCX_LBW_STRIP_FIELDS
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_STRIP_FIELDS
            - name: GTCX_LBW_COMPRESSION
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_COMPRESSION
            - name: GTCX_LBW_CACHE_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_LBW_CACHE_SECONDS
            - name: GTCX_FEATURE_SIGNED_AUDIT
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_FEATURE_SIGNED_AUDIT
            - name: GTCX_FEATURE_FEEDBACK_LOOP
              valueFrom:
                configMapKeyRef:
                  name: gtcx-runtime-policies
                  key: GTCX_FEATURE_FEEDBACK_LOOP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: compliance-gateway
  namespace: gtcx
  labels:
    app: compliance-gateway
spec:
  selector:
    app: compliance-gateway
  ports:
    - name: http
      port: 8500
      targetPort: 8500
  type: ClusterIP
