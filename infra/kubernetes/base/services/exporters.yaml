# =============================================================================
# Infrastructure Exporters — Node + PostgreSQL
# =============================================================================
# Per OBSERVABLE (15): Infrastructure metrics alongside application metrics
# =============================================================================

# -----------------------------------------------------------------------------
# Node Exporter — host-level CPU, memory, disk, network
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-exporter
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: metrics
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-exporter
        app.kubernetes.io/part-of: gtcx
        app.kubernetes.io/component: metrics
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9100'
    spec:
      hostPID: true
      hostNetwork: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.7.0
          args:
            - --path.procfs=/host/proc
            - --path.sysfs=/host/sys
            - --path.rootfs=/host/root
            - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
            - --collector.netclass.ignored-devices=^(veth.*)$
          ports:
            - name: metrics
              containerPort: 9100
              hostPort: 9100
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
            - name: root
              mountPath: /host/root
              mountPropagation: HostToContainer
              readOnly: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
        - name: root
          hostPath:
            path: /
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: node-exporter
    app.kubernetes.io/part-of: gtcx
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '9100'
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: metrics
      port: 9100
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: node-exporter
---
# -----------------------------------------------------------------------------
# PostgreSQL Exporter — database metrics
# -----------------------------------------------------------------------------
# Connects to operational + audit RDS instances via DATABASE_URL env vars.
# Requires gtcx-db-exporter-secrets with connection strings.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: metrics
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-exporter
        app.kubernetes.io/part-of: gtcx
        app.kubernetes.io/component: metrics
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9187'
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          ports:
            - name: metrics
              containerPort: 9187
              protocol: TCP
          env:
            - name: DATA_SOURCE_URI
              valueFrom:
                secretKeyRef:
                  name: gtcx-db-exporter-secrets
                  key: DATA_SOURCE_URI
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: gtcx-db-exporter-secrets
                  key: DATA_SOURCE_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: gtcx-db-exporter-secrets
                  key: DATA_SOURCE_PASS
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: 'true'
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/part-of: gtcx
  annotations:
    prometheus.io/scrape: 'true'
    prometheus.io/port: '9187'
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres-exporter
