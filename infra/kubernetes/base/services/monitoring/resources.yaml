"gridPos":{"h":6,"w":4,"x":20,"y":16},"targets":[{"expr":"slo:agx:error_budget:burn_rate_1h"}],"fieldConfig":{"defaults":{"unit":"x","min":0,"max":20,"thresholds":{"steps":[{"color":"green","value":null},{"color":"yellow","value":6},{"color":"red","value":14.4}]}}}}],"refresh":"30s","schemaVersion":39,"tags":["intelligence","signal","slo"],"time":{"from":"now-7d","to":"now"},"timezone":"utc","title":"Intelligence — SIGNAL L3 Gate","uid":"gtcx-intelligence-signal","version":1}
