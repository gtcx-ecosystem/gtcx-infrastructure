# =============================================================================
# GTCX Production Observability Stack
# =============================================================================
# Per OBSERVABLE principle (15): Full metrics, logs, traces
# Per AUDITABLE principle (3): Retention for compliance
#
# Components: Prometheus, Grafana, Loki, Jaeger
# =============================================================================

# -----------------------------------------------------------------------------
# Namespace
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
---
# -----------------------------------------------------------------------------
# Prometheus ConfigMap
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: gtcx
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: 'gtcx-monitor'
        environment: 'production'

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes pod auto-discovery
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods with prometheus.io/scrape annotation
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          # Use custom metrics path if specified
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          # Use custom port if specified
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          # Map pod labels to prometheus labels
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          # Set namespace label
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          # Set pod name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
          # Set service name from pod label
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: replace
            target_label: service

      # Kubernetes service endpoints
      - job_name: 'kubernetes-service-endpoints'
        kubernetes_sd_configs:
          - role: endpoints
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_service_name

      # Intelligence namespace — explicit targeting for AI services
      - job_name: 'intelligence-sdk'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['gtcx']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: gtcx-intelligence-sdk
            action: keep
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'anisa'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['gtcx']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: gtcx-anisa
            action: keep
        metrics_path: /metrics
        scrape_interval: 15s

      # Node exporter (if deployed as DaemonSet)
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
---
# -----------------------------------------------------------------------------
# Prometheus Deployment
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: metrics
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: gtcx
        app.kubernetes.io/component: metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/
            - name: rules
              mountPath: /etc/prometheus/rules/
            - name: data
              mountPath: /prometheus
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: rules
          configMap:
            name: prometheus-rules
        - name: data
          emptyDir: {}
---
# -----------------------------------------------------------------------------
# Prometheus Rules ConfigMap
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: gtcx
data:
  intelligence-alerts.yml: |
    groups:
      - name: intelligence.rules
        rules:
          - alert: IntelligenceHighErrorRate
            expr: rate(intelligence_errors_total[5m]) / rate(intelligence_requests_total[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
              service: intelligence
            annotations:
              summary: "Intelligence error rate above 5%"
          - alert: IntelligenceLowConfidence
            expr: histogram_quantile(0.5, rate(intelligence_confidence_bucket[5m])) < 0.5
            for: 10m
            labels:
              severity: critical
              service: intelligence
            annotations:
              summary: "Median AI confidence below 0.50"
          - alert: IntelligenceCircuitBreakerTripped
            expr: increase(intelligence_circuit_trips_total[5m]) > 0
            for: 1m
            labels:
              severity: critical
              service: intelligence
            annotations:
              summary: "Circuit breaker tripped on {{ $labels.service }}"
          - alert: IntelligenceHighLatency
            expr: histogram_quantile(0.95, rate(intelligence_request_duration_ms_bucket[5m])) > 5000
            for: 5m
            labels:
              severity: warning
              service: intelligence
            annotations:
              summary: "P95 latency above 5 seconds"
          - alert: IntelligenceHighFallbackRate
            expr: rate(intelligence_degraded_total[5m]) / rate(intelligence_requests_total[5m]) > 0.10
            for: 5m
            labels:
              severity: warning
              service: intelligence
            annotations:
              summary: "Intelligence fallback/degraded rate above 10%"
          - alert: IntelligenceBufferFull
            expr: intelligence_buffer_utilization > 0.90
            for: 2m
            labels:
              severity: warning
              service: intelligence
            annotations:
              summary: "Buffer utilization above 90%"
          - alert: IntelligenceConsensusStaleness
            expr: intelligence_consensus_staleness_seconds > 300
            for: 5m
            labels:
              severity: warning
              service: intelligence
            annotations:
              summary: "Consensus data stale for over 5 minutes"
          - alert: IntelligenceServiceDown
            expr: intelligence_health_status == 0
            for: 1m
            labels:
              severity: critical
              service: intelligence
            annotations:
              summary: "Intelligence service health check failing"
---
# -----------------------------------------------------------------------------
# Prometheus Service
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: gtcx
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: prometheus
---
# -----------------------------------------------------------------------------
# Grafana Deployment
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: dashboards
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: gtcx
        app.kubernetes.io/component: dashboards
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.2
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
---
# -----------------------------------------------------------------------------
# Grafana PVC
# -----------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: gtcx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# -----------------------------------------------------------------------------
# Grafana Dashboard Provisioning
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: gtcx
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: GTCX
        orgId: 1
        folder: GTCX
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
---
# -----------------------------------------------------------------------------
