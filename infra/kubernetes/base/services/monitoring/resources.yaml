# -----------------------------------------------------------------------------
# Jaeger Deployment
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/part-of: gtcx
        app.kubernetes.io/component: tracing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.52
          ports:
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          env:
            # Persistent storage via Badger (survives pod restarts)
            - name: SPAN_STORAGE_TYPE
              value: badger
            - name: BADGER_EPHEMERAL
              value: 'false'
            - name: BADGER_DIRECTORY_VALUE
              value: /badger/data
            - name: BADGER_DIRECTORY_KEY
              value: /badger/key
            # Sampling: 10% default, 100% for errors
            - name: SAMPLING_STRATEGIES_FILE
              value: /etc/jaeger/sampling.json
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: badger-data
              mountPath: /badger
            - name: sampling-config
              mountPath: /etc/jaeger
          livenessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: ui
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 12
      volumes:
        - name: badger-data
          persistentVolumeClaim:
            claimName: jaeger-badger-data
        - name: sampling-config
          configMap:
            name: jaeger-sampling
---
# -----------------------------------------------------------------------------
# Jaeger Sampling Config
# -----------------------------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-sampling
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: gtcx
data:
  sampling.json: |
    {
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      },
      "service_strategies": [
        {
          "service": "gtcx-protocols",
          "type": "probabilistic",
          "param": 0.1
        },
        {
          "service": "gtcx-agx",
          "type": "probabilistic",
          "param": 0.1
        },
        {
          "service": "anisa",
          "type": "probabilistic",
          "param": 0.1
        }
      ]
    }
---
# -----------------------------------------------------------------------------
# Jaeger PVC (Badger persistent storage — 14-day retention)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-badger-data
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: gtcx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
# -----------------------------------------------------------------------------
# Jaeger Service
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/part-of: gtcx
spec:
  type: ClusterIP
  ports:
    - port: 16686
      targetPort: ui
      protocol: TCP
      name: ui
    - port: 4317
      targetPort: otlp-grpc
      protocol: TCP
      name: otlp-grpc
    - port: 4318
      targetPort: otlp-http
      protocol: TCP
      name: otlp-http
  selector:
    app.kubernetes.io/name: jaeger

