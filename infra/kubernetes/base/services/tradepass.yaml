# =============================================================================
# TradePass Identity Service
# =============================================================================
# Universal identity credentials for producers
# Principles: PROOF (1), PRIVATE (2), PORTABLE (22)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-tradepass
  namespace: gtcx
  labels:
    app: gtcx-tradepass
    tier: protocol
    protocol: tradepass
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gtcx-tradepass
  template:
    metadata:
      labels:
        app: gtcx-tradepass
        tier: protocol
        protocol: tradepass
    spec:
      serviceAccountName: gtcx-ecosystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: tradepass
          image: gtcx/api:latest
          imagePullPolicy: Always
          args: ['bundle', 'exec', 'puma', '-C', 'config/puma.rb']
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GTCX_SERVICE_NAME
              value: 'tradepass'
          envFrom:
            - configMapRef:
                name: gtcx-base-config
            - secretRef:
                name: gtcx-secrets
          resources:
            requests:
              cpu: '100m'
              memory: '256Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gtcx-tradepass
  namespace: gtcx
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: http
  selector:
    app: gtcx-tradepass
