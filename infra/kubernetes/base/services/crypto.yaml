# =============================================================================
# GTCX Crypto Service (Rust)
# =============================================================================
# All cryptographic operations per SECURE principle (11)
# Rust-only crypto, distroless container, minimal attack surface
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-crypto
  namespace: gtcx
  labels:
    app: gtcx-crypto
    tier: crypto
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gtcx-crypto
  template:
    metadata:
      labels:
        app: gtcx-crypto
        tier: crypto
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '8080'
        prometheus.io/path: '/metrics'
    spec:
      serviceAccountName: gtcx-crypto
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: crypto
          image: gtcx/crypto:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 8080
              protocol: TCP
          env:
            - name: RUST_LOG
              value: 'info'
            - name: GTCX_CRYPTO_PORT
              value: '8080'
          resources:
            requests:
              cpu: '100m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '256Mi'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: gtcx-crypto
                topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: gtcx-crypto
  namespace: gtcx
  labels:
    app: gtcx-crypto
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
      protocol: TCP
  selector:
    app: gtcx-crypto
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gtcx-crypto
  namespace: gtcx
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gtcx-crypto
  namespace: gtcx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gtcx-crypto
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
