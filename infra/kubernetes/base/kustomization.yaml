# =============================================================================
# GTCX Kubernetes Base Kustomization
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: gtcx-base

commonLabels:
  app.kubernetes.io/part-of: gtcx
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - configmaps/base-config.yaml
  - services/nats.yaml
  - services/api.yaml
  - services/crypto.yaml
  - services/protocols.yaml
  - services/intelligence.yaml
  - services/platform.yaml

configMapGenerator:
  - name: gtcx-env
    literals:
      - GTCX_VERSION=1.0.0
      - GTCX_LOG_LEVEL=info
      - GTCX_LOG_FORMAT=json

# ============================================================
# PLACEHOLDER SECRETS — NEVER USE IN PRODUCTION
# These exist only so kustomize build succeeds in base.
# Production overlays MUST override via:
#   - Sealed Secrets (bitnami/sealed-secrets)
#   - External Secrets Operator (external-secrets.io)
#   - Vault Agent injector
# See: _sop/2-docs/secrets-management.md
# ============================================================
secretGenerator:
  - name: gtcx-secrets
    type: Opaque
    literals:
      - DATABASE_URL=postgres://placeholder:placeholder@localhost:5432/gtcx
      - SECRET_KEY_BASE=placeholder-override-in-overlay

images:
  - name: gtcx/agx
    newTag: latest
  - name: gtcx/crx
    newTag: latest
  - name: gtcx/sgx
    newTag: latest
  - name: gtcx/crypto
    newTag: latest
  - name: gtcx/protocols
    newTag: latest
