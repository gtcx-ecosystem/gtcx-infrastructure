# =============================================================================
# GTCX NATS Configuration — Local Development
# =============================================================================
# Cross-service event bus with JetStream persistence.
#
# Streams (created by services on first connect):
#   GTCX_EVENTS — All domain events (trade, clearance, settlement, compliance)
#   GTCX_AUDIT  — Audit trail events (append-only, long retention)
#
# Subject hierarchy:
#   gtcx.events.{aggregate}.{action}
#
# Protocol events (typed schemas in @gtcx/types):
#   gtcx.events.TradePass.issued    — credential issued to subject
#   gtcx.events.TradePass.revoked   — credential revoked
#   gtcx.events.TradePass.expired   — credential expired
#   gtcx.events.GeoTag.recorded     — location claim recorded for lot
#   gtcx.events.GeoTag.verified     — location claim cross-verified
#   gtcx.events.GeoTag.disputed     — location claim disputed
#   gtcx.events.GCI.scored          — GCI score computed for subject
#   gtcx.events.GCI.updated         — GCI score recalculated
#   gtcx.events.GCI.expired         — GCI score expired
#
# Trading events:
#   gtcx.events.Trade.EXECUTED
#   gtcx.events.ExportClearance.ISSUED
#   gtcx.events.Permit.APPROVED
#   gtcx.events.WorkProof.CREATED
# =============================================================================

server_name: gtcx-nats-dev

# Client connections
port: 4222
max_payload: 1MB
max_connections: 1024

# Monitoring
http_port: 8222

# JetStream — persistent event streams
jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 5GB
}

# Cluster routing (single node in dev, multi-node in production)
cluster {
  name: gtcx-events
  port: 6222
}

# Logging
logtime: true
debug: false
trace: false
