# =============================================================================
# Prometheus Configuration for GTCX
# =============================================================================
# Per OBSERVABLE principle (15): Full metrics collection
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  
  external_labels:
    monitor: 'gtcx-monitor'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # GTCX API Service
  - job_name: 'gtcx-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gtcx-api'

  # GTCX Crypto Service
  - job_name: 'gtcx-crypto'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['crypto:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gtcx-crypto'

  # Protocol Services
  - job_name: 'gtcx-protocols'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'tradepass:3000'
          - 'geotag:3000'
          - 'gci:3000'
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: service
        replacement: '${1}'

  # Platform Services
  - job_name: 'gtcx-platforms'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'crx:3000'
          - 'sgx:3000'
          - 'agx:3000'
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: service
        replacement: '${1}'

  # PostgreSQL Exporter (if deployed)
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis Exporter (if deployed)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
