# =============================================================================
# Replay Protection — Prometheus Alerting Rules
# =============================================================================
# Thresholds aligned with security runbook:
#   docs/operations/runbooks/replay-guard-failure.md
# =============================================================================

groups:
  - name: gtcx-replay-protection
    rules:
      # P1: Replay rejections spiking — possible replay attack
      - alert: ReplayProtectionSpike
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_NONCE"}[5m])) by (pod)
          > 30
        for: 2m
        labels:
          severity: critical
          team: security
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayprotectionspike'
          summary: 'Replay attack suspected — nonce rejections spiking on {{ $labels.pod }}'
          description: '{{ $value | humanize }} nonce rejections per second. Possible replay attack or clock sync issue.'
          runbook: 'docs/operations/runbooks/replay-guard-failure.md'

      # P2: Stale timestamp rejections elevated — clock drift or offline queue backlog
      - alert: ReplayStaleTimestampSpike
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_STALE"}[5m])) by (pod)
          > 10
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replaystaletimestampspike'
          summary: 'Stale timestamp rejections elevated on {{ $labels.pod }}'
          description: '{{ $value | humanize }} stale rejections per second. Check device clock sync or offline queue age.'
          runbook: 'docs/operations/runbooks/replay-guard-failure.md'

      # P2: Future timestamp rejections — device clocks running fast
      - alert: ReplayFutureTimestampSpike
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_FUTURE"}[5m])) by (pod)
          > 5
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayfuturetimestampspike'
          summary: 'Future timestamp rejections on {{ $labels.pod }}'
          description: '{{ $value | humanize }} future rejections per second. Devices may have incorrect system time.'

      # P1: Signature verification failures — possible key compromise or tampering
      - alert: ReplaySignatureFailureSpike
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_SIGNATURE"}[5m])) by (pod)
          > 10
        for: 3m
        labels:
          severity: critical
          team: security
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replaysignaturefailurespike'
          summary: 'Signature verification failures spiking on {{ $labels.pod }}'
          description: '{{ $value | humanize }} signature rejections per second. Possible key rotation issue or tampering.'
          runbook: 'docs/operations/runbooks/replay-guard-failure.md'

      # P2: Envelope/hash mismatch — possible man-in-the-middle or client bug
      - alert: ReplayEnvelopeMismatchSpike
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_ENVELOPE"}[5m])) by (pod)
          > 10
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayenvelopemismatchspike'
          summary: 'Envelope hash mismatches on {{ $labels.pod }}'
          description: '{{ $value | humanize }} envelope rejections per second. Check mobile serialization contract alignment.'

      # P1: Replay Guard service down
      - alert: ReplayGuardDown
        expr: up{job="gtcx-replay-guard"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayguarddown'
          summary: 'Replay Guard is down'
          description: 'Replay Guard health check has been failing for 1 minute. Replay protection is DEGRADED.'
          runbook: 'docs/operations/runbooks/replay-guard-failure.md'

      # P2: Redis nonce store unavailable (fallback to memory)
      - alert: ReplayGuardRedisUnavailable
        expr: >
          replay_guard_redis_connected{job="gtcx-replay-guard"} == 0
        for: 2m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayguardredisunavailable'
          summary: 'Replay Guard Redis store unavailable'
          description: 'Replay Guard has fallen back to in-memory nonce store. Multi-instance replay protection is WEAKENED.'
          runbook: 'docs/operations/runbooks/replay-guard-failure.md'

      # P3: Low-connectivity region extended window usage (informational)
      - alert: ReplayExtendedWindowUsage
        expr: >
          sum(rate(replay_protection_total{code="REPLAY_OK"}[15m])) by (region)
          > 0
        for: 15m
        labels:
          severity: info
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/docs/operations/runbooks/alerts.md#replayextendedwindowusage'
          summary: 'Extended clock-skew window active for region {{ $labels.region }}'
          description: 'Devices in {{ $labels.region }} are using the extended 15-minute acceptance window.'
