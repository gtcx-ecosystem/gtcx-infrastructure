# Staging AGX — avoid boot crash on kustomize stub DATABASE_URL + production NODE_ENV.
# Operational RDS URL synced via platform/scripts/staging/sync-agx-staging-database-url.sh
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-agx
spec:
  template:
    spec:
      containers:
        - name: agx
          env:
            - name: NODE_ENV
              value: staging
            - name: REDIS_URL
              value: redis://redis-staging.gtcx-staging.svc.cluster.local:6379
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: '0'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gtcx-agx-database-staging
                  key: DATABASE_URL
