# =============================================================================
# Staging Ingress — TLS-terminated, WAF-protected
# =============================================================================
# Staging environment ingress with:
#   - AWS ALB (application load balancer)
#   - HTTPS only (TLS 1.2+)
#   - Health checks on /health
#   - WAF association (managed rule group)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gtcx-api
  namespace: gtcx-staging
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:af-south-1:348389439381:certificate/8929e5a0-a4ec-4acf-86f8-945993e1f0c3,arn:aws:acm:af-south-1:348389439381:certificate/9f7149a3-26db-4dee-bce5-b5a3cd29fe16
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/group.name: gtcx-staging-api
    # WAF WebACL association
    alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:af-south-1:348389439381:regional/webacl/gtcx-staging-waf-af-south-1/c918a5e4-bbae-4385-aa6e-e135469c250f
    # external-dns annotations (no-op until external-dns is deployed; safe to
    # set in advance per INF-49 staging-dns runbook). When external-dns runs,
    # these are the only changes needed to auto-manage Route53 A records.
    external-dns.alpha.kubernetes.io/hostname: api.staging.gtcx.trade,geotag.staging.gtcx.trade,sovereign-staging.gtcx.trade
    external-dns.alpha.kubernetes.io/ttl: '60'
spec:
  ingressClassName: alb
  rules:
    - host: api.staging.gtcx.trade
      http:
        paths:
          # PRD-002 / #50–#52 — audit ingest + query on compliance-gateway
          - path: /audit
            pathType: Prefix
            backend:
              service:
                name: compliance-gateway-staging
                port:
                  number: 8500
          # TradePass DID resolution + protocol endpoints — served by gtcx-protocols (#60/#61).
          - path: /v1/tradepass
            pathType: Prefix
            backend:
              service:
                name: gtcx-protocols-staging
                port:
                  number: 8300
          # XR-MKT-011 / S39-01 — markets authority trace capture (7 operations → stub)
          - path: /orders
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /escrow-deposit
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /escrow-release
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /settle-init
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /settle-final
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /cc-issue
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          - path: /cc-pay
            pathType: Prefix
            backend:
              service:
                name: markets-authority-stub-staging
                port:
                  number: 8510
          # Sovereign API (CRX/SGX modules) — routes to platform AGX service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gtcx-agx-staging
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gtcx-protocols-staging
                port:
                  number: 8300
    - host: sovereign-staging.gtcx.trade
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sovereign-staging
                port:
                  number: 3001
    - host: geotag.staging.gtcx.trade
      http:
        paths:
          - path: /audit
            pathType: Prefix
            backend:
              service:
                name: compliance-gateway-staging
                port:
                  number: 8500
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gtcx-protocols-staging
                port:
                  number: 8300
