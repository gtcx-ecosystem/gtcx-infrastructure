# =============================================================================
# Staging Overlay
# =============================================================================
# Pre-production environment for:
#   - Integration testing before production promotion
#   - Pen-test target environment
#   - Chaos engineering experiments
#   - Load testing with realistic data volumes
#
# Principles:
#   - TESTED (P29): Runs full integration suite before promotion
#   - SECURE (P11): TLS-only ingress, NetworkPolicies, WAF
#   - RESILIENT (P12): HPA, PDB, multi-AZ ready
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gtcx-staging

resources:
  - ../../base
  - ingress.yaml
  - markets-authority-stub
  # NOTE: ingress-nginx.yaml and letsencrypt-issuer.yaml are available as
  # fallbacks in this directory but excluded from the active build until
  # an nginx ingress controller is installed in the cluster. See #49.
  - network-policies.yaml

nameSuffix: -staging

labels:
  - includeSelectors: true
    pairs:
      environment: staging

configMapGenerator:
  - name: gtcx-env
    behavior: merge
    literals:
      - GTCX_LOG_LEVEL=info
      - NODE_ENV=staging

# Secrets from external secret manager in staging
# secretGenerator configured via GitOps pipeline

images:
  - name: gtcx/agx
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-agx
    # F-AGX-01 fix: amd64 + @gtcx/platform-shared symlinks (2026-06-10)
    newTag: staging-amd64-fix-7d200374636e
  - name: gtcx/protocols
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-protocols
    # v0.4.5: production CMD + GET /v1/dids/auth/{iso}/{slug} + CSP bundle (INF-49 / #60).
    # PNV2 verifier readiness image built for the staging cluster's amd64 nodes.
    newTag: e7525dfa-amd64
  # Anomaly detector — staging uses same version as other services
  - name: gtcx-anomaly-detector
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-anomaly-detector
    newTag: latest
  # XR-104: Bearer auth for TradePass DID resolve (commit 764fb83).
  # NOTE: Original audit-tradepass-auth tag was ARM64-only; rebuilt as audit-tradepass-auth-amd64.
  - name: 348389439381.dkr.ecr.af-south-1.amazonaws.com/compliance-gateway
    newTag: audit-tradepass-auth-amd64
  - name: gtcx/sovereign
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-sovereign
    newTag: staging

# Staging resource limits (moderate)
patches:
  # Compliance Gateway — Redis nonce store URL
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-redis.yaml
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-audit-staging.yaml
  # XR-104: Fix audit signing secret reference — use manually-managed secret
  # instead of kustomize-generated placeholder (avoids keyLoadFailed).
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-staging-env.yaml
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-metrics.yaml
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-replicas.yaml
  # NOTE: audit-flush removed from base — image is ARM64-only, nodes are AMD64.
  # Re-add when AMD64 image is available.
  # - path: audit-flush-patch.yaml
  # NetworkPolicy — per-environment database subnet CIDR
  - target:
      kind: NetworkPolicy
      name: gtcx-agx-policy
    path: patches/agx-db-cidr.yaml
  - target:
      kind: NetworkPolicy
      name: gtcx-ecosystem-policy
    path: patches/ecosystem-db-cidr.yaml
  - path: anomaly-detector-patch.yaml
    target:
      kind: CronJob
      name: anomaly-detector
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "200m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "384Mi"
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: gtcx-agx
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: gtcx-agx
  - path: patches/protocols-staging-env.yaml
    target:
      kind: Deployment
      name: gtcx-protocols
  - path: patches/protocols-probes-staging.yaml
    target:
      kind: Deployment
      name: gtcx-protocols
  - path: patches/agx-staging-env.yaml
    target:
      kind: Deployment
      name: gtcx-agx
  # Protocols — reduce memory for t3.small nodes
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "384Mi"
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: gtcx-protocols
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: gtcx-protocols
  - patch: |-
      - op: replace
        path: /data/NATS_URL
        value: "nats://gtcx-nats-staging.gtcx-staging.svc.cluster.local:4222"
      - op: replace
        path: /data/EVENT_BUS_DRIVER
        value: "memory"
    target:
      kind: ConfigMap
      name: gtcx-base-config
  - path: patches/sovereign-staging-env.yaml
    target:
      kind: Deployment
      name: sovereign
  - path: patches/platform-sa-irsa.yaml
    target:
      kind: ServiceAccount
      name: gtcx-platform
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: sovereign
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
    target:
      kind: HorizontalPodAutoscaler
      name: sovereign
  # NATS — emptyDir instead of PVC (EBS CSI driver not installed in cluster)
  - path: patches/nats-emptydir.yaml
    target:
      kind: StatefulSet
      name: gtcx-nats
