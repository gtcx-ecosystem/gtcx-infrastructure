version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps):'
    groups:
      typescript:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      linting:
        patterns:
          - 'eslint*'
          - 'prettier'
    # Ignore @types/node major bumps — the type version is tied to the
    # Node runtime we deploy on (currently Node 20.x → @types/node 22.x).
    # Each unsolicited 23.x/24.x/25.x bump opens a PR that sits, gets
    # reviewed, and gets closed without merge. Pin to ~22.x via
    # package.json; suppress the major-bump PR storm here.
    # (Q7 ANSWERED 2026-05-31 — execution-roadmap.md.)
    ignore:
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci):'
    # Group bumps so SHA pinning doesn't produce 30 PRs/week. Reviewers
    # see one PR per family that pin-actions-sha.mjs --check then
    # validates is still 40-char SHA-pinned.
    groups:
      actions-core:
        patterns:
          - 'actions/*'
      aws-actions:
        patterns:
          - 'aws-actions/*'
      docker:
        patterns:
          - 'docker/*'
      security-scanners:
        patterns:
          - 'aquasecurity/*'
          - 'github/codeql-action*'
          - 'sigstore/*'
          - 'slsa-framework/*'
          - 'trufflesecurity/*'
          - 'zaproxy/*'
      terraform:
        patterns:
          - 'hashicorp/setup-terraform'
          - 'terraform-linters/*'
