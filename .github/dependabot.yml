version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps):'
    groups:
      typescript:
        patterns:
          - 'typescript'
          - '@typescript-eslint/*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
      linting:
        patterns:
          - 'eslint*'
          - 'prettier'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'chore(ci):'
    # Group bumps so SHA pinning doesn't produce 30 PRs/week. Reviewers
    # see one PR per family that pin-actions-sha.mjs --check then
    # validates is still 40-char SHA-pinned.
    groups:
      actions-core:
        patterns:
          - 'actions/*'
      aws-actions:
        patterns:
          - 'aws-actions/*'
      docker:
        patterns:
          - 'docker/*'
      security-scanners:
        patterns:
          - 'aquasecurity/*'
          - 'github/codeql-action*'
          - 'sigstore/*'
          - 'slsa-framework/*'
          - 'trufflesecurity/*'
          - 'zaproxy/*'
      terraform:
        patterns:
          - 'hashicorp/setup-terraform'
          - 'terraform-linters/*'
