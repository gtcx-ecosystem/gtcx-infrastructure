# =============================================================================
# GTCX Shared Action — Build & Test
# =============================================================================
# Reusable composite action for all TypeScript service repos.
# Standardizes: install, lint, typecheck, test, build.
#
# Usage in service repo workflow:
#   - uses: gtcx-ecosystem/gtcx-infrastructure/.github/actions/build-and-test@main
# =============================================================================

name: 'GTCX Build & Test'
description: 'Standard build, lint, typecheck, and test for GTCX TypeScript repos'

inputs:
  node-version:
    description: 'Node.js version'
    required: false
    default: '20.18.0'
  pnpm-version:
    description: 'pnpm version'
    required: false
    default: '9.15.0'
  working-directory:
    description: 'Directory to run commands in'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'pnpm'
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile

    - name: Lint
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm lint

    - name: Type check
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm typecheck

    - name: Test with coverage gate
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        pnpm test --coverage --coverageReporters=text-summary || true
        COVERAGE=$(pnpm test --coverage --coverageReporters=text-summary 2>&1 | grep -oP 'Statements\s+:\s+\K[0-9.]+' || echo "0")
        echo "Statement coverage: ${COVERAGE}%"
        if (( $(echo "$COVERAGE < 70" | bc -l) )); then
          echo "::error::Coverage ${COVERAGE}% is below the M3 threshold of 70%"
          exit 1
        fi

    - name: Build
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ github.sha }}
        path: ${{ inputs.working-directory }}/dist
        retention-days: 7
