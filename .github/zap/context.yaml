# OWASP ZAP Context — Authenticated Scanning
#
# This file configures ZAP's scanning context for the GTCX staging environment.
# Update the authentication section when the API auth mechanism is finalized.
#
# Reference: https://www.zaproxy.org/01-docs/desktop/ui/dialogs/session/context-auth/

env:
  contexts:
    - name: 'gtcx-staging'
      urls:
        - '${STAGING_URL}'
      includePaths:
        - '${STAGING_URL}/api/.*'
        - '${STAGING_URL}/health.*'
      excludePaths:
        - ".*\\.js$"
        - ".*\\.css$"
        - ".*\\.png$"
        - ".*\\.jpg$"
        - ".*\\.svg$"
        - ".*\\.woff2?$"
        - ".*\\.ico$"
      # Authentication placeholder — configure when API auth is available.
      # Supports: HTTP/NTLM, form-based, JSON-based, script-based.
      #
      # authentication:
      #   method: "json"
      #   parameters:
      #     loginPageUrl: "${STAGING_URL}/api/auth/login"
      #     loginRequestUrl: "${STAGING_URL}/api/auth/login"
      #     loginRequestBody: '{"email":"{%username%}","password":"{%password%}"}'
      #   verification:
      #     method: "response"
      #     loggedInRegex: "\"token\":"
      #     loggedOutRegex: "\"error\":\"unauthorized\""
      #
      # users:
      #   - name: "zap-scanner"
      #     credentials:
      #       username: "${ZAP_SCAN_USERNAME}"
      #       password: "${ZAP_SCAN_PASSWORD}"

  parameters:
    failOnError: true
    progressToStdout: true
