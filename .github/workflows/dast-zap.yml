name: DAST — OWASP ZAP

on:
  schedule:
    # Run every Sunday at 02:00 UTC (low-traffic window)
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to scan'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - testnet
      target_url:
        description: 'Override target URL (leave empty to use environment default)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: dast-zap-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  zap-full-scan:
    name: OWASP ZAP Full Scan (${{ github.event.inputs.environment || 'staging' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve target URL
        id: target
        run: |
          if [ -n "${{ github.event.inputs.target_url }}" ]; then
            echo "url=${{ github.event.inputs.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ vars.STAGING_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate target URL
        run: |
          URL="${{ steps.target.outputs.url }}"
          if [ -z "$URL" ]; then
            echo "::error::No target URL resolved. Set STAGING_URL in environment variables or provide target_url input."
            exit 1
          fi
          echo "Scanning: $URL"

      - name: OWASP ZAP full scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ steps.target.outputs.url }}
          rules_file_name: '.github/zap/rules.tsv'
          cmd_options: >-
            -j
            -z "-configfile /zap/wrk/.github/zap/context.yaml"
          artifact_name: ''
          allow_issue_writing: false
        env:
          ZAP_AUTH_HEADER: ${{ secrets.ZAP_AUTH_HEADER }}

      - name: Rename reports
        if: always()
        run: |
          TIMESTAMP=$(date -u +%Y%m%dT%H%M%SZ)
          mkdir -p reports
          [ -f report_html.html ] && cp report_html.html "reports/zap-report-${ENVIRONMENT}-${TIMESTAMP}.html"
          [ -f report_json.json ] && cp report_json.json "reports/zap-report-${ENVIRONMENT}-${TIMESTAMP}.json"
          echo "REPORT_TIMESTAMP=${TIMESTAMP}" >> "$GITHUB_ENV"

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-dast-report-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Evaluate findings
        if: always()
        id: evaluate
        run: |
          REPORT="reports/zap-report-${ENVIRONMENT}-${REPORT_TIMESTAMP}.json"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::No JSON report found — skipping evaluation"
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HIGH=$(jq '[.site[].alerts[] | select(.riskcode == "3")] | length' "$REPORT" 2>/dev/null || echo 0)
          CRITICAL=$(jq '[.site[].alerts[] | select(.riskcode == "4")] | length' "$REPORT" 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode == "2")] | length' "$REPORT" 2>/dev/null || echo 0)

          echo "critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "medium=$MEDIUM" >> "$GITHUB_OUTPUT"

          echo "## ZAP Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Severity | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Critical | $CRITICAL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| High     | $HIGH |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Medium   | $MEDIUM |" >> "$GITHUB_STEP_SUMMARY"

          TOTAL=$((HIGH + CRITICAL))
          if [ "$TOTAL" -gt 0 ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "::error::Found $CRITICAL critical and $HIGH high severity findings"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "No high/critical findings detected"
          fi

      - name: Create GitHub issue on new findings
        if: always() && steps.evaluate.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const critical = parseInt('${{ steps.evaluate.outputs.critical }}') || 0;
            const high = parseInt('${{ steps.evaluate.outputs.high }}') || 0;
            const medium = parseInt('${{ steps.evaluate.outputs.medium }}') || 0;
            const env = '${{ env.ENVIRONMENT }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const title = `[DAST] ${critical + high} high/critical findings in ${env} — ${new Date().toISOString().split('T')[0]}`;

            // Check for existing open issue to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'security,dast',
              per_page: 5,
            });

            const duplicate = existing.data.find(i => i.title.includes('[DAST]') && i.title.includes(env));
            if (duplicate) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: duplicate.number,
                body: `## Updated scan results — ${new Date().toISOString()}\n\n| Severity | Count |\n|----------|-------|\n| Critical | ${critical} |\n| High | ${high} |\n| Medium | ${medium} |\n\n[View run](${runUrl})`,
              });
              core.info(`Updated existing issue #${duplicate.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              labels: ['security', 'dast'],
              body: [
                `## DAST Scan — OWASP ZAP`,
                ``,
                `**Environment:** ${env}`,
                `**Scan date:** ${new Date().toISOString()}`,
                `**Run:** [${context.runId}](${runUrl})`,
                ``,
                `### Findings`,
                ``,
                `| Severity | Count |`,
                `|----------|-------|`,
                `| Critical | ${critical} |`,
                `| High     | ${high} |`,
                `| Medium   | ${medium} |`,
                ``,
                `### Next steps`,
                ``,
                `1. Download the full report from the [workflow artifacts](${runUrl})`,
                `2. Triage each finding — confirm or mark as false positive`,
                `3. Remediate confirmed findings before next production deploy`,
                `4. Update \`.github/zap/rules.tsv\` for verified false positives`,
              ].join('\n'),
            });

      - name: Fail on high/critical findings
        if: always() && steps.evaluate.outputs.has_findings == 'true'
        run: |
          echo "::error::DAST scan found high/critical vulnerabilities. See artifacts for details."
          exit 1
