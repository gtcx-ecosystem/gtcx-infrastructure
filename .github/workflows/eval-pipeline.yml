# =============================================================================
# Eval Pipeline — AI Output Validation
# =============================================================================
# Runs evaluation benchmarks against all registered AI models.
# Fails CI if any model falls below its threshold.
#
# Triggered on:
#   - Changes to eval pipeline code
#   - Changes to model cards or benchmarks
#   - Changes to AI service code
# =============================================================================

name: Eval Pipeline — AI Output Validation

on:
  push:
    branches: [main]
    paths:
      - '03-platform/tools/eval-pipeline/**'
      - '01-docs/ml/model-cards/**'
      - '03-platform/tools/anomaly-detector/**'
      - '03-platform/tools/compliance-gateway/**'
      - '03-platform/tools/replay-protection/**'
      - '.github/workflows/eval-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - '03-platform/tools/eval-pipeline/**'
      - '01-docs/ml/model-cards/**'
      - '03-platform/tools/anomaly-detector/**'
      - '03-platform/tools/compliance-gateway/**'
      - '03-platform/tools/replay-protection/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    name: Evaluate AI Models
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.18.0'

      - name: Run Eval Pipeline
        run: |
          cd 03-platform/tools/eval-pipeline
          node eval.mjs --all | tee eval-results.json

      - name: Upload eval results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: 03-platform/tools/eval-pipeline/eval-results.json
          retention-days: 90

      - name: Parse results for PR comment
        if: github.event_name == 'pull_request'
        id: parse
        run: |
          cd 03-platform/tools/eval-pipeline
          PASSED=$(node eval.mjs --all 2>/dev/null | jq '.passed')
          FAILED=$(node eval.mjs --all 2>/dev/null | jq '.failed')
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
