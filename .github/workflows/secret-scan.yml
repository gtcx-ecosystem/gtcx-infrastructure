# =============================================================================
# Secret Scanning — TruffleHog
# =============================================================================
# Scans repository for leaked secrets, API keys, tokens, and credentials.
# Fails CI if any verified secrets are found.
#
# Tools: TruffleHog (trufflesecurity/trufflehog)
# Coverage: Entire git history + current working tree
# =============================================================================

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@9f0b97f1600cd5f51e5ecb8380087807acb790f9 # pin: main (branch — review on dependabot bumps)
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
