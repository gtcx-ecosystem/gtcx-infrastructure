# SIGNAL INF-005 — weekly injection-suite static witness
name: Injection Suite — Weekly Witness

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  injection-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20.18.0'

      - name: Run injection-suite static witness
        run: node 03-platform/scripts/ops/run-injection-suite-witness.mjs

      - name: Upload evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: injection-suite-latest
          path: 01-docs/05-audit/evidence/injection-suite-latest.json
          retention-days: 90
