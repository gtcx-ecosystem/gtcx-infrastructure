name: Chaos Engineering Test

on:
  schedule:
    # 1st of every month at 03:00 UTC
    - cron: '0 3 1 * *'
  pull_request:
    branches: [main]
    paths:
      - '04-ship/kubernetes/**'
      - '.github/workflows/chaos-test.yml'
      - '03-platform/tools/scripts/chaos-manifest-validator.mjs'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      experiment:
        description: 'Experiment to run (all = full suite)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - pod-kill
          - network-partition
          - az-failure

concurrency:
  group: chaos-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}
  SLO_ERROR_RATE_THRESHOLD: '5'
  SLO_P99_LATENCY_THRESHOLD: '2000'

jobs:
  # ---------------------------------------------------------------------------
  # PR validation — lightweight manifest check (no destructive experiments)
  # ---------------------------------------------------------------------------
  validate-manifests:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate chaos manifests
        run: node 03-platform/tools/scripts/chaos-manifest-validator.mjs

  # ---------------------------------------------------------------------------
  # Production requires manual approval via GitHub environment protection
  # ---------------------------------------------------------------------------
  approve:
    if: github.event.inputs.environment == 'production'
    runs-on: ubuntu-latest
    environment: production-chaos
    steps:
      - name: Approval gate
        run: echo "Production chaos test approved by environment protection rule."

  # ---------------------------------------------------------------------------
  # Setup — configure cluster access and baseline metrics
  # (PRs run validate-manifests only; AWS OIDC is not configured for pull_request)
  # ---------------------------------------------------------------------------
  setup:
    needs: [approve]
    if: github.event_name != 'pull_request' && always() && (needs.approve.result == 'success' || needs.approve.result == 'skipped')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    outputs:
      baseline_error_rate: ${{ steps.baseline.outputs.error_rate }}
      baseline_p99: ${{ steps.baseline.outputs.p99_latency }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name gtcx-${ENVIRONMENT} --region af-south-1

      - name: Capture baseline metrics
        id: baseline
        run: |
          # Query Prometheus for current error rate and p99 latency
          PROM_POD=$(kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -z "$PROM_POD" ]; then
            echo "Prometheus not found — using default baselines"
            echo "error_rate=0" >> "$GITHUB_OUTPUT"
            echo "p99_latency=500" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          kubectl port-forward -n monitoring "$PROM_POD" 9090:9090 &
          sleep 5

          ERROR_RATE=$(curl -s 'http://localhost:9090/api/v1/query?query=sum(rate(http_requests_total{code=~"5.."}[5m]))/sum(rate(http_requests_total[5m]))*100' | jq -r '.data.result[0].value[1] // "0"')
          P99=$(curl -s 'http://localhost:9090/api/v1/query?query=histogram_quantile(0.99,sum(rate(http_request_duration_seconds_bucket[5m]))by(le))*1000' | jq -r '.data.result[0].value[1] // "500"')

          echo "error_rate=${ERROR_RATE}" >> "$GITHUB_OUTPUT"
          echo "p99_latency=${P99}" >> "$GITHUB_OUTPUT"
          echo "Baseline — error rate: ${ERROR_RATE}%, p99: ${P99}ms"

  # ---------------------------------------------------------------------------
  # Experiment 1: Pod Kill — kill random pods in gtcx namespace
  # ---------------------------------------------------------------------------
  pod-kill:
    needs: [setup]
    if: github.event_name != 'pull_request' && contains(fromJSON('["all", "pod-kill"]'), github.event.inputs.experiment || 'all')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name gtcx-${ENVIRONMENT} --region af-south-1

      - name: Run pod-kill experiment
        id: experiment
        run: |
          NAMESPACE="gtcx-${ENVIRONMENT}"
          REPORT_FILE="/tmp/chaos-report-pod-kill.json"
          echo '{"experiment":"pod-kill","start":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","events":[]}' > "$REPORT_FILE"

          # Kill each deployment's random pod, one at a time
          for DEPLOY in gtcx-replay-guard gtcx-api gtcx-protocols; do
            POD=$(kubectl get pods -n "$NAMESPACE" -l app="$DEPLOY" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
            if [ -z "$POD" ]; then
              echo "No pods found for $DEPLOY — skipping"
              continue
            fi

            echo "Killing pod $POD in deployment $DEPLOY"
            kubectl delete pod "$POD" -n "$NAMESPACE" --grace-period=0 --force 2>/dev/null || true

            # Wait for replacement pod
            kubectl rollout status deployment/"$DEPLOY" -n "$NAMESPACE" --timeout=120s

            # SLO gate check
            sleep 10
            ERROR_RATE=$(curl -s "http://localhost:9090/api/v1/query?query=sum(rate(http_requests_total{code=~\"5..\"}[1m]))/sum(rate(http_requests_total[1m]))*100" 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
            P99=$(curl -s "http://localhost:9090/api/v1/query?query=histogram_quantile(0.99,sum(rate(http_request_duration_seconds_bucket[1m]))by(le))*1000" 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')

            echo "Post-kill metrics — error rate: ${ERROR_RATE}%, p99: ${P99}ms"

            # Abort if SLO breached
            if [ "$(echo "$ERROR_RATE > $SLO_ERROR_RATE_THRESHOLD" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              echo "::error::SLO BREACH: Error rate ${ERROR_RATE}% exceeds ${SLO_ERROR_RATE_THRESHOLD}% threshold after killing $DEPLOY"
              echo '{"deployment":"'"$DEPLOY"'","pod":"'"$POD"'","result":"slo_breach","error_rate":"'"$ERROR_RATE"'","p99":"'"$P99"'"}' | jq '.' >> "$REPORT_FILE"
              exit 1
            fi

            if [ "$(echo "$P99 > $SLO_P99_LATENCY_THRESHOLD" | bc -l 2>/dev/null || echo 0)" = "1" ]; then
              echo "::error::SLO BREACH: P99 latency ${P99}ms exceeds ${SLO_P99_LATENCY_THRESHOLD}ms threshold after killing $DEPLOY"
              exit 1
            fi

            echo "SLO maintained after killing $DEPLOY"
          done

          echo '{"experiment":"pod-kill","end":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","result":"pass"}' >> "$REPORT_FILE"

      - name: Upload pod-kill report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chaos-report-pod-kill-${{ github.run_id }}
          path: /tmp/chaos-report-pod-kill.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Experiment 2: Network Partition — isolate a pod from the database
  # ---------------------------------------------------------------------------
  network-partition:
    needs: [setup]
    if: github.event_name != 'pull_request' && contains(fromJSON('["all", "network-partition"]'), github.event.inputs.experiment || 'all')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name gtcx-${ENVIRONMENT} --region af-south-1

      - name: Run network-partition experiment
        run: |
          NAMESPACE="gtcx-${ENVIRONMENT}"
          REPORT_FILE="/tmp/chaos-report-network-partition.json"
          echo '{"experiment":"network-partition","start":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > "$REPORT_FILE"

          # Apply a NetworkPolicy that blocks egress to PostgreSQL port
          cat <<'NETPOL' | kubectl apply -n "$NAMESPACE" -f -
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: chaos-block-db
            labels:
              chaos-experiment: network-partition
          spec:
            podSelector:
              matchLabels:
                app: gtcx-replay-guard
            policyTypes:
              - Egress
            egress:
              - to:
                  - podSelector: {}
                ports:
                  - port: 443
                    protocol: TCP
                  - port: 53
                    protocol: UDP
                  - port: 53
                    protocol: TCP
          NETPOL

          echo "NetworkPolicy applied — replay-guard isolated from database"
          echo "Waiting 60 seconds to observe behavior..."
          sleep 60

          # Check that the service degrades gracefully (returns 503, not crash)
          POD=$(kubectl get pods -n "$NAMESPACE" -l app=gtcx-replay-guard -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$POD" ]; then
            STATUS=$(kubectl get pod "$POD" -n "$NAMESPACE" -o jsonpath='{.status.phase}')
            RESTARTS=$(kubectl get pod "$POD" -n "$NAMESPACE" -o jsonpath='{.status.containerStatuses[0].restartCount}')
            echo "Pod status: $STATUS, restarts: $RESTARTS"
          fi

          # Remove the chaos NetworkPolicy
          kubectl delete networkpolicy chaos-block-db -n "$NAMESPACE" 2>/dev/null || true
          echo "NetworkPolicy removed — connectivity restored"

          # Wait for recovery
          sleep 15
          kubectl rollout status deployment/gtcx-replay-guard -n "$NAMESPACE" --timeout=120s

          echo '{"experiment":"network-partition","end":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","result":"pass","pod_status":"'"${STATUS}"'","restarts":"'"${RESTARTS}"'"}' >> "$REPORT_FILE"

      - name: Upload network-partition report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chaos-report-network-partition-${{ github.run_id }}
          path: /tmp/chaos-report-network-partition.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Experiment 3: AZ Failure — cordon all nodes in one availability zone
  # ---------------------------------------------------------------------------
  az-failure:
    needs: [setup]
    if: github.event_name != 'pull_request' && contains(fromJSON('["all", "az-failure"]'), github.event.inputs.experiment || 'all')
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name gtcx-${ENVIRONMENT} --region af-south-1

      - name: Run AZ failure experiment
        run: |
          NAMESPACE="gtcx-${ENVIRONMENT}"
          REPORT_FILE="/tmp/chaos-report-az-failure.json"
          echo '{"experiment":"az-failure","start":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' > "$REPORT_FILE"

          # Pick the first AZ with nodes
          TARGET_AZ=$(kubectl get nodes -o jsonpath='{.items[0].metadata.labels.topology\.kubernetes\.io/zone}')
          echo "Simulating failure of AZ: $TARGET_AZ"

          # Cordon all nodes in target AZ
          NODES=$(kubectl get nodes -l "topology.kubernetes.io/zone=$TARGET_AZ" -o jsonpath='{.items[*].metadata.name}')
          for NODE in $NODES; do
            echo "Cordoning node: $NODE"
            kubectl cordon "$NODE"
          done

          # Drain pods (with timeout, don't delete local data)
          for NODE in $NODES; do
            kubectl drain "$NODE" --ignore-daemonsets --delete-emptydir-data --timeout=60s --force 2>/dev/null || true
          done

          echo "AZ $TARGET_AZ nodes cordoned and drained. Waiting 90 seconds for rescheduling..."
          sleep 90

          # Verify pods rescheduled to other AZs
          PENDING=$(kubectl get pods -n "$NAMESPACE" --field-selector=status.phase=Pending -o name | wc -l)
          RUNNING=$(kubectl get pods -n "$NAMESPACE" --field-selector=status.phase=Running -o name | wc -l)
          echo "After AZ failure — pending: $PENDING, running: $RUNNING"

          # SLO gate
          if [ "$PENDING" -gt 0 ]; then
            echo "::warning::$PENDING pods still pending after AZ failure simulation"
          fi

          # Uncordon nodes to restore
          for NODE in $NODES; do
            echo "Uncordoning node: $NODE"
            kubectl uncordon "$NODE"
          done

          echo "AZ $TARGET_AZ restored"
          sleep 30

          echo '{"experiment":"az-failure","end":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","target_az":"'"$TARGET_AZ"'","pending_after":"'"$PENDING"'","running_after":"'"$RUNNING"'","result":"pass"}' >> "$REPORT_FILE"

      - name: Upload AZ failure report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chaos-report-az-failure-${{ github.run_id }}
          path: /tmp/chaos-report-az-failure.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Summary — aggregate results and generate final report
  # ---------------------------------------------------------------------------
  report:
    needs: [pod-kill, network-partition, az-failure]
    if: github.event_name != 'pull_request' && always()
    runs-on: ubuntu-latest
    steps:
      - name: Download all reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: chaos-report-*
          path: /tmp/chaos-reports/
          merge-multiple: true

      - name: Generate summary report
        run: |
          REPORT_FILE="/tmp/chaos-summary.md"
          cat > "$REPORT_FILE" <<EOF
          # Chaos Engineering Test Report

          **Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)
          **Environment:** ${ENVIRONMENT}
          **Trigger:** ${{ github.event_name }}
          **Run ID:** ${{ github.run_id }}

          ## Results

          | Experiment | Status |
          |-----------|--------|
          | Pod Kill | ${{ needs.pod-kill.result }} |
          | Network Partition | ${{ needs.network-partition.result }} |
          | AZ Failure | ${{ needs.az-failure.result }} |

          ## SLO Thresholds

          - Error rate: < ${SLO_ERROR_RATE_THRESHOLD}%
          - P99 latency: < ${SLO_P99_LATENCY_THRESHOLD}ms

          ## Raw Data

          See attached artifacts for per-experiment JSON reports.
          EOF

          cat "$REPORT_FILE"

      - name: Upload summary report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: chaos-summary-${{ github.run_id }}
          path: /tmp/chaos-summary.md
          retention-days: 365
