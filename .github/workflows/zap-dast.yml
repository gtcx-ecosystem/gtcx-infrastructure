name: OWASP ZAP DAST Scan

on:
  schedule:
    - cron: '0 2 * * 0' # Weekly: Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'https://staging.gtcx.africa'
      scan_type:
        description: 'Scan type: baseline or full'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - full

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    env:
      TARGET_URL: ${{ github.event.inputs.target_url || 'https://staging.gtcx.africa' }}
      SCAN_TYPE: ${{ github.event.inputs.scan_type || 'baseline' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: ZAP Baseline Scan
        if: env.SCAN_TYPE == 'baseline'
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: ZAP Full Scan
        if: env.SCAN_TYPE == 'full'
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_id }}
          path: report_*.html
          retention-days: 90

      - name: Create Issue on High/Critical Findings
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🛡️ ZAP DAST: High/Critical findings on ${process.env.TARGET_URL}`;
            const body = `OWASP ZAP ${process.env.SCAN_TYPE} scan detected high or critical severity issues.\n\n` +
              `- **Target**: ${process.env.TARGET_URL}\n` +
              `- **Run**: [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n` +
              `- **Artifact**: Download the HTML report from the workflow artifacts.\n\n` +
              `cc @gtcx-ecosystem/security-team`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'dast', 'zap', 'phase3']
            });
