# =============================================================================
# Build, Scan & Push to ECR
# =============================================================================
# Triggered on merge to main. Builds all GTCX service images, runs Trivy
# security scans, and pushes immutable commit-SHA tags to ECR.
#
# Image → ECR repo mapping:
#   intelligence-sdk → gtcx-intelligence-sdk
#   trainer          → gtcx-intelligence-trainer
#   redteam          → gtcx-intelligence-redteam
#   protocols        → gtcx-protocols
#   platforms        → gtcx-agx
#   baselineos       → baselineos
# =============================================================================

name: Build & Push to ECR

on:
  push:
    branches: [main]
    paths:
      - '04-deploy/docker/**'
      - '04-deploy/kubernetes/**'
      - '04-deploy/03-platform/scripts/**'
      - '.github/workflows/build-push-ecr.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write
  contents: read
  security-events: write

env:
  AWS_REGION: af-south-1
  ECR_ACCOUNT: 348389439381

jobs:
  build-push:
    runs-on: ubuntu-latest
    # Allow update-manifests to run even if some matrix jobs fail.
    # Individual failures are still visible in the UI.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: intelligence-sdk
            dockerfile: 04-deploy/docker/Dockerfile.intelligence
            context_dir: intelligence
            target: ''
            ecr_repos: gtcx-intelligence-sdk
            source_repos: gtcx-intelligence

          - name: trainer
            dockerfile: intelligence/intelligence/trainer/Dockerfile
            context_dir: intelligence
            target: ''
            ecr_repos: gtcx-intelligence-trainer
            source_repos: gtcx-intelligence

          - name: redteam
            dockerfile: intelligence/intelligence/red-team/Dockerfile
            context_dir: intelligence
            target: ''
            ecr_repos: gtcx-intelligence-redteam
            source_repos: gtcx-intelligence

          - name: protocols
            dockerfile: Dockerfile
            context_dir: protocols
            target: ''
            ecr_repos: gtcx-protocols
            source_repos: gtcx-protocols

          - name: agx
            dockerfile: platforms/Dockerfile
            context_dir: platforms
            target: production
            ecr_repos: gtcx-agx
            source_repos: gtcx-platforms
            build_args: PLATFORM=agx,APP_PORT=3000

          - name: sovereign
            dockerfile: platforms/Dockerfile
            context_dir: platforms
            target: production
            ecr_repos: gtcx-sovereign
            source_repos: gtcx-platforms
            build_args: PLATFORM=sovereign,APP_PORT=3001

          - name: baselineos
            dockerfile: baseline-os/Dockerfile
            context_dir: baseline-os
            target: ''
            ecr_repos: baselineos
            source_repos: baseline-os

          - name: compliance-gateway
            dockerfile: 03-platform/tools/compliance-gateway/Dockerfile
            context_dir: .
            target: ''
            ecr_repos: compliance-gateway
            source_repos: ''

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Checkout source repos into paths the Dockerfiles expect
      - name: Checkout gtcx-intelligence source
        if: contains(matrix.service.source_repos, 'gtcx-intelligence')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gtcx-ecosystem/gtcx-intelligence
          token: ${{ secrets.GTCX_REPO_TOKEN }}
          path: intelligence

      - name: Checkout gtcx-protocols source
        if: contains(matrix.service.source_repos, 'gtcx-protocols')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gtcx-ecosystem/gtcx-protocols
          token: ${{ secrets.GTCX_REPO_TOKEN }}
          path: protocols

      - name: Checkout gtcx-platforms source
        if: contains(matrix.service.source_repos, 'gtcx-platforms')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gtcx-ecosystem/gtcx-platforms
          token: ${{ secrets.GTCX_REPO_TOKEN }}
          path: platforms

      - name: Checkout baseline-os source
        if: contains(matrix.service.source_repos, 'baseline-os')
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gtcx-ecosystem/baseline-os
          token: ${{ secrets.GTCX_REPO_TOKEN }}
          path: baseline-os

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Build image
        run: |
          DOCKERFILE="${{ matrix.service.dockerfile }}"
          CONTEXT_DIR="${{ matrix.service.context_dir }}"
          TARGET_FLAG=""
          if [ -n "${{ matrix.service.target }}" ]; then
            TARGET_FLAG="--target ${{ matrix.service.target }}"
          fi

          BUILD_ARGS_FLAG=""
          if [ -n "${{ matrix.service.build_args }}" ]; then
            IFS=',' read -ra ARGS <<< "${{ matrix.service.build_args }}"
            for ARG in "${ARGS[@]}"; do
              BUILD_ARGS_FLAG="$BUILD_ARGS_FLAG --build-arg $ARG"
            done
          fi

          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"

          # Build once, tag for all target repos with immutable SHA tags only
          TAGS=""
          IFS=',' read -ra REPOS <<< "${{ matrix.service.ecr_repos }}"
          for REPO in "${REPOS[@]}"; do
            TAGS="$TAGS -t ${REGISTRY}/${REPO}:${SHA_SHORT}"
          done

          docker build \
            $TARGET_FLAG \
            $BUILD_ARGS_FLAG \
            $TAGS \
            -f "$DOCKERFILE" \
            "$CONTEXT_DIR"

      - name: Set primary ECR repo
        id: primary_repo
        run: |
          FIRST=$(echo "${{ matrix.service.ecr_repos }}" | cut -d',' -f1)
          echo "name=${FIRST}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # pin: master (branch — review on dependabot bumps)
        continue-on-error: true
        with:
          image-ref: '${{ steps.ecr-login.outputs.registry }}/${{ steps.primary_repo.outputs.name }}:${{ steps.primary_repo.outputs.tag }}'
          format: sarif
          output: trivy-${{ matrix.service.name }}.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-${{ matrix.service.name }}.sarif

      - name: Generate container SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@bfa4b33a029b9aa80ddb784b45574c30e072c59e # pin: master (branch — review on dependabot bumps)
        with:
          image-ref: '${{ steps.ecr-login.outputs.registry }}/${{ steps.primary_repo.outputs.name }}:${{ steps.primary_repo.outputs.tag }}'
          format: 'cyclonedx'
          output: 'sbom-${{ matrix.service.name }}.cdx.json'

      - name: Upload container SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.cdx.json
          retention-days: 365

      - name: Push to ECR
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IFS=',' read -ra REPOS <<< "${{ matrix.service.ecr_repos }}"
          for REPO in "${REPOS[@]}"; do
            docker push "${REGISTRY}/${REPO}:${SHA_SHORT}"
            echo "### Pushed ${REPO}" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`${REGISTRY}/${REPO}:${SHA_SHORT}\`" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign container images (keyless via Fulcio/Rekor)
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IFS=',' read -ra REPOS <<< "${{ matrix.service.ecr_repos }}"
          for REPO in "${REPOS[@]}"; do
            IMAGE="${REGISTRY}/${REPO}:${SHA_SHORT}"
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${IMAGE}" 2>/dev/null || echo "${IMAGE}")
            cosign sign --yes "${DIGEST}"
            echo "- Signed: \`${REPO}:${SHA_SHORT}\`" >> "$GITHUB_STEP_SUMMARY"
          done
        env:
          COSIGN_EXPERIMENTAL: 'true'

      - name: Verify signatures
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO=$(echo "${{ matrix.service.ecr_repos }}" | cut -d',' -f1)
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp "https://github.com/gtcx-ecosystem/*" \
            "${REGISTRY}/${REPO}:${SHA_SHORT}" || echo "Verification will work after first push with signatures"

  # Update K8s manifests with new image SHAs after all builds succeed
  update-manifests:
    needs: build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Update production kustomization image tags
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          cd 04-deploy/kubernetes/overlays/production

          # Only update tags for images that actually exist in ECR
          update_if_exists() {
            local repo=$1
            if aws ecr describe-images --repository-name "${repo}" --image-ids imageTag="${SHA_SHORT}" --region "${AWS_REGION}" >/dev/null 2>&1; then
              echo "Updating ${repo}:${SHA_SHORT}"
              echo "${repo}=${REGISTRY}/${repo}:${SHA_SHORT}" >> .kustomize-images.txt
            else
              echo "Skipping ${repo}:${SHA_SHORT} (not found in ECR)"
            fi
          }

          update_if_exists gtcx-agx
          update_if_exists gtcx-protocols

          if [ -s .kustomize-images.txt ]; then
            kustomize edit set image $(cat .kustomize-images.txt)
            rm .kustomize-images.txt
          fi

      - name: Update staging kustomization image tags
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          cd 04-deploy/kubernetes/overlays/staging

          # Only update compliance-gateway if the image exists in ECR
          if aws ecr describe-images --repository-name compliance-gateway --image-ids imageTag="${SHA_SHORT}" --region "${AWS_REGION}" >/dev/null 2>&1; then
            kustomize edit set image \
              "${REGISTRY}/compliance-gateway=${REGISTRY}/compliance-gateway:${SHA_SHORT}"
            echo "Updated compliance-gateway:${SHA_SHORT}"
          else
            echo "Skipping compliance-gateway:${SHA_SHORT} (not found in ECR)"
            exit 1
          fi

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 04-deploy/kubernetes/overlays/production/kustomization.yaml
          git add 04-deploy/kubernetes/overlays/staging/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(deploy): update image tags to ${GITHUB_SHA::8}"
          git push

  # Deploy updated manifests to the production cluster
  deploy:
    needs: update-manifests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production # Requires manual approval via GitHub environment protection rules
    steps:
      - name: Checkout (with updated manifests)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main # Pull the commit with updated image tags

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "gtcx-zimbabwe-pilot" \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy to production
        run: |
          kubectl apply -k 04-deploy/kubernetes/overlays/production/
          echo "### Deployed to production" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cluster: gtcx-zimbabwe-pilot" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/gtcx-agx-prod -n gtcx-production --timeout=300s
          echo "- Rollout: **healthy**" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify health
        run: |
          AGX_POD=$(kubectl get pods -n gtcx-production -l app=gtcx-agx-prod -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [[ -n "${AGX_POD}" ]]; then
            kubectl exec "${AGX_POD}" -n gtcx-production -- wget -q --spider http://localhost:3000/api/health
            echo "- Health check: **passed**" >> "$GITHUB_STEP_SUMMARY"
          fi
