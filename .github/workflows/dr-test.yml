name: DR Test

on:
  schedule:
    # Run every Monday at 06:00 UTC (low-traffic window)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging

permissions:
  id-token: write
  contents: read

jobs:
  dr-test:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'testnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name gtcx-${{ github.event.inputs.environment || 'testnet' }} --region af-south-1

      - name: Port-forward protocol server
        run: |
          NAMESPACE="gtcx-${{ github.event.inputs.environment || 'testnet' }}"
          kubectl port-forward -n "$NAMESPACE" svc/gtcx-protocols 8300:8300 &
          sleep 5

      - name: Port-forward PostgreSQL
        run: |
          NAMESPACE="gtcx-${{ github.event.inputs.environment || 'testnet' }}"
          kubectl port-forward -n "$NAMESPACE" svc/gtcx-postgres 5432:5432 &
          kubectl port-forward -n "$NAMESPACE" svc/gtcx-postgres-audit 5433:5432 &
          sleep 5

      - name: Run DR test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: gtcx
          AUDIT_HOST: localhost
          AUDIT_PORT: 5433
          AUDIT_USER: ${{ secrets.AUDIT_USER }}
          AUDIT_PASSWORD: ${{ secrets.AUDIT_PASSWORD }}
          AUDIT_DB: gtcx_audit
          PROTOCOL_URL: http://localhost:8300
          OUTPUT_DIR: 04-deploy/security/reports/dr-evidence/${{ github.event.inputs.environment || 'testnet' }}/${{ github.run_id }}
        run: |
          bash ./04-deploy/03-platform/scripts/dr-test.sh ${{ github.event.inputs.environment || 'testnet' }}

      - name: Upload DR evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dr-evidence-${{ github.run_id }}
          path: |
            /tmp/gtcx_dr_test_*.sql
            04-deploy/security/reports/dr-evidence/${{ github.event.inputs.environment || 'testnet' }}/${{ github.run_id }}/
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::DR test failed for ${{ github.event.inputs.environment || 'testnet' }}. Check artifacts for evidence."

  canary-rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'testnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: 'v1.30.0'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name gtcx-${{ github.event.inputs.environment || 'testnet' }} --region af-south-1

      - name: Deploy known-good image
        run: |
          kubectl set image deployment/gtcx-replay-guard \
            replay-guard=gtcx/replay-guard:v0.1.0-stable \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }}
          kubectl rollout status deployment/gtcx-replay-guard \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }}

      - name: Deploy broken image (simulated failure)
        run: |
          kubectl set image deployment/gtcx-replay-guard \
            replay-guard=gtcx/replay-guard:v0.1.0-broken-exit-1 \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }}
          kubectl rollout status deployment/gtcx-replay-guard \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }} \
            --timeout=60s || true

      - name: Capture rollback evidence
        run: |
          bash 04-deploy/03-platform/scripts/capture-rollback-evidence.sh \
            ${{ github.event.inputs.environment || 'testnet' }} \
            --previous-revision=v0.1.0-stable \
            --failed-revision=v0.1.0-broken-exit-1 \
            --reason="CI canary rollback test"

      - name: Rollback to stable
        run: |
          kubectl rollout undo deployment/gtcx-replay-guard \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }}
          kubectl rollout status deployment/gtcx-replay-guard \
            -n gtcx-${{ github.event.inputs.environment || 'testnet' }}

      - name: Upload rollback evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rollback-evidence-${{ github.run_id }}
          path: 04-deploy/security/reports/rollback-evidence/${{ github.event.inputs.environment || 'testnet' }}/
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Canary rollback test failed for ${{ github.event.inputs.environment || 'testnet' }}. Check artifacts for evidence."
