name: DR Test

on:
  schedule:
    # Run every Monday at 06:00 UTC (low-traffic window)
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'testnet'
        type: choice
        options:
          - testnet
          - staging

permissions:
  contents: read

jobs:
  dr-test:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'testnet' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Setup PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: af-south-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name gtcx-${{ github.event.inputs.environment || 'testnet' }} --region af-south-1

      - name: Port-forward protocol server
        run: |
          kubectl port-forward -n gtcx svc/gtcx-protocols 8300:8300 &
          sleep 5

      - name: Port-forward PostgreSQL
        run: |
          kubectl port-forward -n gtcx svc/gtcx-postgres 5432:5432 &
          kubectl port-forward -n gtcx svc/gtcx-postgres-audit 5433:5432 &
          sleep 5

      - name: Run DR test
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: gtcx
          AUDIT_HOST: localhost
          AUDIT_PORT: 5433
          AUDIT_USER: ${{ secrets.AUDIT_USER }}
          AUDIT_PASSWORD: ${{ secrets.AUDIT_PASSWORD }}
          AUDIT_DB: gtcx_audit
          PROTOCOL_URL: http://localhost:8300
        run: |
          bash ./infra/scripts/dr-test.sh ${{ github.event.inputs.environment || 'testnet' }}

      - name: Upload DR evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-evidence-${{ github.run_id }}
          path: /tmp/gtcx_dr_test_*.sql
          retention-days: 90

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::DR test failed for ${{ github.event.inputs.environment || 'testnet' }}. Check artifacts for evidence."
