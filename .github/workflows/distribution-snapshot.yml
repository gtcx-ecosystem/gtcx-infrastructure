name: distribution-snapshot

# Daily snapshot of npm downloads + GitHub stars/forks/issues
# for the two distribution-strategy bets: @gtcx/audit-signer (npm) and
# terraform-aws-compliance-db (GitHub + future Terraform Registry).
#
# Output: 01-docs/05-audit/distribution-snapshots/<YYYY-MM-DD>.json, committed
# to main so progression is visible in git history without a separate
# metrics service.

on:
  schedule:
    - cron: '17 6 * * *' # 06:17 UTC daily (off the hour to spread cron load)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: distribution-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.18.0'

      - name: Run snapshot
        run: node 03-platform/tools/03-platform/scripts/distribution-snapshot.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain 01-docs/05-audit/distribution-snapshots/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add 01-docs/05-audit/distribution-snapshots/
            git commit -m "chore(metrics): distribution snapshot $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No snapshot change; nothing to commit."
          fi
