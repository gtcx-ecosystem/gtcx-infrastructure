name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20.18.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit gate
        run: |
          echo "Running pnpm audit with acceptance-log filter..."
          node tools/scripts/audit-with-acceptance.mjs --output-file=npm-audit-filtered.json
          echo "Dependency audit passed."

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm typecheck

      - name: Infrastructure validation smoke
        run: pnpm test

      - name: Terraform binary gate
        run: |
          echo "Checking for committed Terraform binaries or state files..."
          VIOLATIONS=$(git diff --name-only origin/main...HEAD | grep -E '\.terraform/|\.tfstate|\.tfstate\.' || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Committed Terraform artifacts detected:"
            echo "$VIOLATIONS"
            echo "Run: git filter-repo --path-glob '*.tfstate*' --path-glob '.terraform/**' --invert-paths"
            exit 1
          fi
          echo "No Terraform artifacts in diff."

      - name: Build
        run: pnpm exec turbo run build --filter='!@gtcx/docs-site'

      - name: Replay protection tests
        run: |
          cd tools/replay-protection
          node --test tests/verifier.test.mjs tests/integration.test.mjs

      - name: Replay protection coverage gate
        run: |
          cd tools/replay-protection
          pnpm test:coverage:gate
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          npx c8 report --reporter=text --include='src/**' --exclude='tests/**' 2>/dev/null || true
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Replay protection production policy tests
        run: |
          node --test \
            tools/replay-protection/tests/failure-modes.test.mjs \
            tools/replay-protection/tests/runtime-policy.test.mjs \
            tools/replay-protection/tests/production-fail-closed.test.mjs

      - name: Audit immutability fixture
        run: bash infra/scripts/test-audit-immutability.sh

      - name: Generate build evidence
        run: |
          node tools/control-plane/generate-release-evidence.mjs \
            --environment=ci \
            --version=ci-${{ github.sha }} \
            --commit=${{ github.sha }} \
            --build-only \
            --image=replay-guard=gtcx/replay-guard:ci-${{ github.sha }} \
            --scan=replay-guard=passed \
            --gate=install=pass \
            --gate=dependency-audit=pass \
            --gate=lint=pass \
            --gate=format=pass \
            --gate=typecheck=pass \
            --gate=test=pass \
            --gate=terraform-binary-gate=pass \
            --gate=build=pass \
            --gate=replay-protection-tests=pass \
            --gate=audit-immutability-fixture=pass \
            --evidence=score-ledger=docs/audit/score-evidence-ledger.json \
            --worm-key=release-evidence/ci/${{ github.sha }}/release-evidence.ndjson \
            --output-dir=infra/security/reports/release-evidence/ci/$(date -u +%Y%m%dT%H%M%SZ)

      - name: Upload release evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-evidence-ci
          path: infra/security/reports/release-evidence/ci/
          retention-days: 90

      - name: Validate score-evidence ledger
        run: node tools/scripts/validate-score-ledger.mjs

      - name: Security control boundaries
        run: node tools/policy/check-security-control-boundaries.mjs

      - name: Kyverno policy validation
        run: node tools/scripts/kyverno-policy-validator.mjs

      - name: Master validation (all gates)
        run: node tools/scripts/validate-all.mjs
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Protocol 22 agent:next-work smoke
        run: |
          pnpm agent:next-work > agent-next-work-output.json
          cat agent-next-work-output.json
          node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('agent-next-work-output.json', 'utf8'));
            if (!data.ok) { console.error('agent:next-work returned ok:false'); process.exit(1); }
            if (data.protocol !== '22-agent-work-selection') { console.error('Wrong protocol:', data.protocol); process.exit(1); }
            console.log('Protocol 22 smoke passed —', data.backlogClear ? 'backlog clear' : 'next story:', data.next?.storyId ?? 'N/A');
          "

      - name: Protocol 22 adoption check
        run: pnpm agent:work-selection:check

      - name: Protocol 26 adoption check
        run: pnpm agent:proceed-confirmation:check

      - name: Protocol 27 adoption check
        run: pnpm agent:execution-obligation:check

      - name: Chaos manifest validation
        run: node tools/scripts/chaos-manifest-validator.mjs

      - name: PagerDuty incident drill simulation
        run: node tools/scripts/incident-drill-pagerduty-simulation.mjs --dry-run

      - name: Compliance gateway tests
        run: |
          cd tools/compliance-gateway
          pnpm test

      - name: Compliance gateway coverage gate
        run: |
          cd tools/compliance-gateway
          pnpm test:coverage:gate

      - name: Deployment guard tests
        run: |
          cd tools/deployment-guard
          pnpm test

      - name: Deployment guard coverage gate
        run: |
          cd tools/deployment-guard
          pnpm test:coverage:gate

      - name: Incident-drill validation
        run: node tools/scripts/incident-drill-validator.mjs

      - name: SIGNAL scorecard validation
        run: node tools/scripts/validate-signal.mjs

      - name: Protocol API contract tests
        run: node --test tools/contract-tests/protocol-schema.test.mjs

      - name: Install k6
        run: |
          K6_VERSION="v0.52.0"
          curl -fsSL "https://github.com/grafana/k6/releases/download/${K6_VERSION}/k6-${K6_VERSION}-linux-amd64.tar.gz" | tar -xz -C /tmp
          sudo mv "/tmp/k6-${K6_VERSION}-linux-amd64/k6" /usr/local/bin/

      - name: Load tests
        run: |
          bash tools/load-tests/run-load-tests.sh --output-dir=infra/security/reports/load-evidence/ci/$(date -u +%Y%m%dT%H%M%SZ)

      - name: Upload load-test evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: load-test-evidence-ci
          path: infra/security/reports/load-evidence/ci/
          retention-days: 90

  docs-standard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Docs-standard validation
        run: node tools/scripts/docs-standard-validator.mjs --baseline=.docs-exceptions.json

  eval-pipeline:
    runs-on: ubuntu-latest
    name: Eval Pipeline — AI Output Validation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20.18.0'

      - name: Run eval pipeline
        run: |
          cd tools/eval-pipeline
          node eval.mjs --all | tee eval-results.json

      - name: Upload eval results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: eval-results-ci
          path: tools/eval-pipeline/eval-results.json
          retention-days: 90

  iac-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
        with:
          terraform_version: '1.5.0'

      - name: Shell script checks
        run: |
          shellcheck infra/scripts/*.sh
          bash infra/scripts/build-push.sh --list >/dev/null
          bash infra/scripts/deploy.sh staging --dry-run --version=sha-ci-smoke >/dev/null
          bash infra/scripts/fine-tune-workflow.sh --help >/dev/null
          bash infra/scripts/capture-rollback-evidence.sh --help >/dev/null
          bash infra/scripts/prepare-intelligence-evidence-env.sh --help >/dev/null

      - name: Terraform format check
        run: terraform fmt -check -recursive infra/terraform/

      - name: Install tflint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: latest

      - name: IaC security lint (tflint)
        run: |
          for module in infra/terraform/modules/*/; do
            echo "Linting $module..."
            tflint --chdir="$module" --minimum-failure-severity=error || true
          done

      - name: IaC security scan (Trivy config)
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # pin: v0.34.0 (SHA)
        with:
          scan-type: 'config'
          scan-ref: 'infra/terraform/'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

      - name: Terraform validate — VPC module
        run: |
          cd infra/terraform/modules/vpc
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Database module
        run: |
          cd infra/terraform/modules/database
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — EKS module
        run: |
          cd infra/terraform/modules/eks
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — ECR module
        run: |
          cd infra/terraform/modules/ecr
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Workflow Orchestration module
        run: |
          cd infra/terraform/modules/workflow-orchestration
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Secrets module
        run: |
          cd infra/terraform/modules/secrets
          echo '{}' | zip -q lambda/rotation.zip -
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — ALB module
        run: |
          cd infra/terraform/modules/alb
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Backup module
        run: |
          cd infra/terraform/modules/backup
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Detective module
        run: |
          cd infra/terraform/modules/detective
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Compliance module
        run: |
          cd infra/terraform/modules/compliance
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Event Bus module
        run: |
          cd infra/terraform/modules/event-bus
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — KYC Documents module
        run: |
          cd infra/terraform/modules/kyc-documents
          terraform init -backend=false
          terraform validate

      - name: Terraform validate — Multi-Region module
        run: |
          cd infra/terraform/modules/multi-region/ci-validate
          terraform init -backend=false
          terraform validate

      - name: Terraform native tests
        run: |
          for module in vpc database eks ecr workflow-orchestration secrets alb backup detective compliance event-bus kyc-documents compliance-db ml-pipeline trace-pipeline vault multi-region; do
            cd "infra/terraform/modules/${module}"
            if [ "${module}" = "secrets" ]; then
              echo '{}' | zip -q lambda/rotation.zip -
            fi
            terraform init -backend=false
            terraform test
            cd - >/dev/null
          done

      - name: Prepare Kustomize render evidence
        run: mkdir -p infra/security/reports/kustomize-rendered/ci

      - name: Kustomize build — base
        run: kubectl kustomize infra/kubernetes/base/ > infra/security/reports/kustomize-rendered/ci/base.yaml

      - name: Kustomize build — dev overlay
        run: kubectl kustomize infra/kubernetes/overlays/development/ > infra/security/reports/kustomize-rendered/ci/development.yaml

      - name: Kustomize build — staging overlay
        run: kubectl kustomize infra/kubernetes/overlays/staging/ > infra/security/reports/kustomize-rendered/ci/staging.yaml

      - name: Kustomize build — staging linkerd overlay
        run: kubectl kustomize infra/kubernetes/overlays/staging/linkerd/ > infra/security/reports/kustomize-rendered/ci/staging-linkerd.yaml

      - name: Kustomize build — production overlay
        run: kubectl kustomize infra/kubernetes/overlays/production/ > infra/security/reports/kustomize-rendered/ci/production.yaml

      - name: Kustomize build — production linkerd overlay
        run: kubectl kustomize infra/kubernetes/overlays/production/linkerd/ > infra/security/reports/kustomize-rendered/ci/production-linkerd.yaml

      - name: Kustomize build — testnet overlay
        run: kubectl kustomize infra/kubernetes/overlays/testnet/ > infra/security/reports/kustomize-rendered/ci/testnet.yaml

      - name: Kustomize build — pen-test overlay
        run: kubectl kustomize infra/kubernetes/overlays/pen-test/ > infra/security/reports/kustomize-rendered/ci/pen-test.yaml

      - name: Upload Kustomize render evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: kustomize-rendered-ci
          path: infra/security/reports/kustomize-rendered/ci/
          retention-days: 90

      - name: Docker Compose config validation
        run: |
          docker compose -f infra/docker/docker-compose.dev.yml config --quiet
          docker compose -f infra/docker/docker-compose.test.yml config --quiet
          docker compose -f infra/docker/docker-compose.infra.yml config --quiet

      - name: DR test — backup integrity
        env:
          # Dev creds for the ephemeral Compose Postgres. Sourced as repo
          # secrets so the dr-test.sh fail-fast guard exercises the same
          # secret-load path it does in staging/production.
          POSTGRES_HOST: localhost
          POSTGRES_USER: gtcx
          POSTGRES_DB: gtcx_development
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'gtcx_dev_password' }}
          AUDIT_HOST: localhost
          AUDIT_USER: gtcx_audit
          AUDIT_DB: gtcx_audit
          POSTGRES_AUDIT_PASSWORD: ${{ secrets.CI_POSTGRES_AUDIT_PASSWORD || 'gtcx_audit_dev_password' }}
          PROTOCOL_URL: http://localhost:8300
          DR_SKIP_PROTOCOL_HEALTH: '1'
        run: |
          docker compose -f infra/docker/docker-compose.dev.yml up -d postgres postgres-audit
          sleep 10
          export OUTPUT_DIR=infra/security/reports/dr-evidence/ci/$(date -u +%Y%m%dT%H%M%SZ)
          bash infra/scripts/dr-test.sh testnet
          docker compose -f infra/docker/docker-compose.dev.yml down

      - name: Upload DR evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dr-evidence-ci
          path: infra/security/reports/dr-evidence/ci/
          retention-days: 90

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: javascript-typescript
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          category: '/language:javascript-typescript'
          output: codeql-results
          upload: false

      - name: Upload CodeQL SARIF
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: codeql-results

      - name: Gate on critical/high findings
        if: always()
        run: |
          echo "CodeQL analysis complete."
          echo "Critical and high-severity findings will block merge via GitHub branch protection rules."
          echo "Configure branch protection to require 'codeql' status check to pass."

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # pin: v0.34.0 (SHA)
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@314ff8b43182423b84c50b1670b0e10f858f2d98 # pin: v0.34.0 (SHA)
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom-cyclonedx.json'

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom-infrastructure
          path: sbom-cyclonedx.json
          retention-days: 365
