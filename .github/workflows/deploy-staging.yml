# =============================================================================
# Deploy to Staging
# =============================================================================
# Triggered on changes to Kubernetes manifests. Authenticates via OIDC,
# applies the staging overlay, and verifies rollout health.
#
# Prerequisites:
#   - AWS Deploy Role (OIDC) has EKS read/write access
#   - GitHub Environment "staging" configured with protection rules (optional)
# =============================================================================

name: Deploy to Staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths:
      - 'infra/kubernetes/**'
      - '.github/workflows/deploy-staging.yml'
  workflow_dispatch: # Allow manual trigger

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: af-south-1
  CLUSTER_NAME: gtcx-staging
  NAMESPACE: gtcx-staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: staging # Optional: add protection rules for manual approval
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        run: |
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          CREDS=$(aws sts assume-role-with-web-identity \
            --role-arn "${{ vars.AWS_ROLE_ARN }}" \
            --role-session-name "github-actions-deploy-staging" \
            --web-identity-token "$TOKEN" \
            --region "${{ env.AWS_REGION }}" \
            --output json)
          echo "AWS_ACCESS_KEY_ID=$(echo "$CREDS" | jq -r '.Credentials.AccessKeyId')" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=$(echo "$CREDS" | jq -r '.Credentials.SecretAccessKey')" >> "$GITHUB_ENV"
          echo "AWS_SESSION_TOKEN=$(echo "$CREDS" | jq -r '.Credentials.SessionToken')" >> "$GITHUB_ENV"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --name "${{ env.CLUSTER_NAME }}" \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy to staging
        run: |
          kubectl apply -k infra/kubernetes/overlays/staging/
          echo "### Deployed to staging" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cluster: ${{ env.CLUSTER_NAME }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy intelligence staging overlay
        run: |
          kubectl apply -k infra/kubernetes/overlays/staging/intelligence/
          echo "- Intelligence staging ingress: **applied**" >> "$GITHUB_STEP_SUMMARY"

      - name: Wait for rollouts
        run: |
          set +e
          FAILED=0

          for DEPLOYMENT in compliance-gateway-staging gtcx-agx-staging gtcx-protocols-staging; do
            echo "Checking rollout for ${DEPLOYMENT}..."
            if kubectl rollout status "deployment/${DEPLOYMENT}" \
                -n "${{ env.NAMESPACE }}" --timeout=300s; then
              echo "- ${DEPLOYMENT}: **healthy**" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- ${DEPLOYMENT}: **FAILED**" >> "$GITHUB_STEP_SUMMARY"
              FAILED=1
            fi
          done

          # Intelligence orchestrator lives in the intelligence namespace
          echo "Checking rollout for intelligence-orchestrator..."
          if kubectl rollout status deployment/intelligence-orchestrator \
              -n intelligence --timeout=300s; then
            echo "- intelligence-orchestrator: **healthy**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- intelligence-orchestrator: **FAILED**" >> "$GITHUB_STEP_SUMMARY"
            FAILED=1
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "::error::One or more deployments failed to rollout"
            exit 1
          fi

      - name: Smoke test — compliance-gateway health
        run: |
          # Port-forward to compliance-gateway and hit /health
          kubectl port-forward -n "${{ env.NAMESPACE }}" \
            "deployment/compliance-gateway-staging" 8080:8500 &
          PF_PID=$!
          sleep 5

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://localhost:8080/health || echo "000")

          kill $PF_PID 2>/dev/null || true

          if [ "$HTTP_CODE" = "200" ]; then
            echo "- Smoke test (/health): **passed**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Smoke test (/health): **failed** (HTTP ${HTTP_CODE})" >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Smoke test failed with HTTP ${HTTP_CODE}"
            exit 1
          fi

      - name: Smoke test — audit API reachability (durable evidence)
        id: audit-smoke
        run: |
          OUTPUT_DIR=infra/security/reports/staging-smoke/${{ github.run_id }} \
            node scripts/staging-audit-probe.mjs
          echo "- Audit API smoke test: **completed**" >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Upload staging smoke evidence
        if: always() && steps.audit-smoke.outcome != 'skipped'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: staging-smoke-evidence-${{ github.run_id }}
          path: infra/security/reports/staging-smoke/${{ github.run_id }}/
          retention-days: 365

      - name: Collect rollout evidence on failure
        if: failure()
        run: |
          echo "### Rollout diagnostics" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "${{ env.NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
