# =============================================================================
# Build & Push Anomaly Detector to ECR
# =============================================================================
# Triggered on changes to tools/anomaly-detector/.
# Uses shared CI deploy role (AWS_ROLE_ARN) and ECR_REGISTRY variables.
# =============================================================================

name: Build & Push — Anomaly Detector

on:
  push:
    branches: [main]
    paths:
      - 'tools/anomaly-detector/**'
      - '.github/workflows/build-push-anomaly-detector.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: tools/anomaly-detector
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/gtcx-anomaly-detector:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/gtcx-anomaly-detector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name gtcx-anomaly-detector \
            --image-ids imageTag=${{ github.sha }}
