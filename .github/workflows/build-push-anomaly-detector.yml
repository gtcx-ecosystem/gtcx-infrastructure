# =============================================================================
# Build & Push Anomaly Detector to ECR
# =============================================================================
# Triggered on changes to tools/anomaly-detector/.
# Uses shared CI deploy role (AWS_ROLE_ARN) and ECR_REGISTRY variables.
# =============================================================================

name: Build & Push — Anomaly Detector

on:
  push:
    branches: [main]
    paths:
      - 'tools/anomaly-detector/**'
      - '.github/workflows/build-push-anomaly-detector.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: af-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: tools/anomaly-detector
          push: true
          tags: |
            ${{ vars.ECR_REGISTRY }}/anomaly-detector:${{ github.sha }}
            ${{ vars.ECR_REGISTRY }}/anomaly-detector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name anomaly-detector \
            --image-ids imageTag=${{ github.sha }}
