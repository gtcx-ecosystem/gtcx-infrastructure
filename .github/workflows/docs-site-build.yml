name: docs-site-build

# Build-only verification for the Astro Starlight static-site at
# 03-platform/tools/docs-site/. Runs on PRs that touch the docs-site markdown
# source or the build config. Does NOT deploy.

on:
  pull_request:
    paths:
      - '01-docs/gitbook/docs-site/**'
      - '03-platform/tools/docs-site/**'
      - '.github/workflows/docs-site-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-site-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.12.0'
          cache: 'pnpm'

      - name: Install workspace deps (docs-site only)
        run: pnpm install --filter @gtcx/docs-site... --frozen-lockfile

      - name: Sync markdown source
        run: pnpm -F @gtcx/docs-site sync

      - name: Build site
        run: pnpm -F @gtcx/docs-site build
        env:
          DOCS_SITE_SKIP_DRAFTS: '1'
