# =============================================================================
# Prometheus Configuration for GTCX
# =============================================================================
# Per OBSERVABLE principle (15): Full metrics collection
#
# Target status legend:
#   [ACTIVE]      - Target exists in docker-compose.infra.yml and is scrapeable
#   [PLACEHOLDER] - Target requires application services not yet implemented;
#                   Prometheus will log scrape errors for these until the
#                   corresponding service is deployed.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: 'gtcx-monitor'
    environment: 'development'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - '/etc/prometheus/alerts/*.yml'
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # --------------------------------------------------------------------------
  # [ACTIVE] Prometheus self-monitoring
  # --------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # --------------------------------------------------------------------------
  # [PLACEHOLDER] GTCX AGX Service -- requires 6-platforms NestJS app
  # --------------------------------------------------------------------------
  - job_name: 'gtcx-agx'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['agx:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gtcx-agx'

  # --------------------------------------------------------------------------
  # [ACTIVE] Protocol Server -- unified Node.js service for all 6 protocols
  # --------------------------------------------------------------------------
  - job_name: 'gtcx-protocols'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['protocols:8300']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'gtcx-protocols'

  # --------------------------------------------------------------------------
  # [PLACEHOLDER] Platform Services -- requires CRX, SGX, AGX apps
  # --------------------------------------------------------------------------
  - job_name: 'gtcx-platforms'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - 'crx:3001'
          - 'sgx:3002'
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: service
        replacement: '${1}'

  # --------------------------------------------------------------------------
  # [PLACEHOLDER] PostgreSQL Exporter -- requires postgres-exporter sidecar
  # --------------------------------------------------------------------------
  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # --------------------------------------------------------------------------
  # [PLACEHOLDER] Redis Exporter -- requires redis-exporter sidecar
  # --------------------------------------------------------------------------
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # --------------------------------------------------------------------------
  # [PLACEHOLDER] Node Exporter -- requires node-exporter container
  # --------------------------------------------------------------------------
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
