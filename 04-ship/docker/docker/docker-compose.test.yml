# =============================================================================
# GTCX Test Docker Compose
# =============================================================================
#
# Minimal configuration for CI/CD testing.
# Fast startup, isolated, deterministic.
#
# Principles Implemented:
#   - TESTED (29): Comprehensive test environment
#   - SECURE (11): Isolated, no persistent data
#   - DEPLOYABLE (14): Same services as production
#
# Usage:
#   docker compose -f docker/docker-compose.test.yml up -d
#   docker compose -f docker/docker-compose.test.yml run --rm platforms-test
#   docker compose -f docker/docker-compose.test.yml down -v
#
# =============================================================================

name: gtcx-test

services:
  # ===========================================================================
  # DATABASES (Ephemeral)
  # ===========================================================================

  postgres:
    image: postgres:16.4-alpine
    container_name: gtcx-test-postgres
    environment:
      POSTGRES_USER: gtcx_test
      POSTGRES_PASSWORD: gtcx_test_password
      POSTGRES_DB: gtcx_test
    # No ports exposed - internal only
    tmpfs:
      - /var/lib/postgresql/data # RAM disk for speed
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gtcx_test -d gtcx_test']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gtcx-test-network

  postgres-audit:
    image: postgres:16.4-alpine
    container_name: gtcx-test-postgres-audit
    environment:
      POSTGRES_USER: gtcx_test_audit
      POSTGRES_PASSWORD: gtcx_test_audit_password
      POSTGRES_DB: gtcx_test_audit
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gtcx_test_audit -d gtcx_test_audit']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gtcx-test-network

  redis:
    image: redis:7.2.4-alpine
    container_name: gtcx-test-redis
    tmpfs:
      - /data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - gtcx-test-network

  # ===========================================================================
  # TEST RUNNERS
  # ===========================================================================

  # Platform Services Test Runner (NestJS / Vitest)
  platforms-test:
    build:
      context: ../../../6-platforms
      dockerfile: ../gtcx-infrastructure/04-ship/docker/Dockerfile.platforms
      target: build
      args:
        PLATFORM: agx
    container_name: gtcx-test-platforms
    environment:
      NODE_ENV: test
      CI: 'true'
      DATABASE_URL: postgres://gtcx_test:gtcx_test_password@postgres:5432/gtcx_test
      AUDIT_DATABASE_URL: postgres://gtcx_test_audit:gtcx_test_audit_password@postgres-audit:5432/gtcx_test_audit
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: ['pnpm', 'test', '--', '--reporter=junit', '--outputFile=test-results/results.xml']
    networks:
      - gtcx-test-network

  # Protocol Services Test Runner (Vitest)
  protocols-test:
    build:
      context: ../../../gtcx-protocols
      dockerfile: ../gtcx-infrastructure/04-ship/docker/Dockerfile.protocols
      target: production
    container_name: gtcx-test-protocols
    environment:
      NODE_ENV: test
      CI: 'true'
      DATABASE_URL: postgres://gtcx_test:gtcx_test_password@postgres:5432/gtcx_test
      AUDIT_DATABASE_URL: postgres://gtcx_test_audit:gtcx_test_audit_password@postgres-audit:5432/gtcx_test_audit
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      postgres-audit:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    command: ['pnpm', 'test', '--', '--reporter=junit', '--outputFile=test-results/results.xml']
    networks:
      - gtcx-test-network

  # ===========================================================================
  # E2E TESTS (Playwright)
  # ===========================================================================

  e2e-test:
    image: mcr.microsoft.com/playwright:v1.40.0-jammy
    container_name: gtcx-test-e2e
    environment:
      CI: 'true'
      BASE_URL: http://agx:3000
    depends_on:
      - platforms-test
    volumes:
      - ../../../6-platforms:/app
    working_dir: /app
    command: ['npx', 'playwright', 'test', '--reporter=junit']
    networks:
      - gtcx-test-network

  # ===========================================================================
  # SECURITY SCANNING
  # ===========================================================================

  # Dependency vulnerability scanning
  security-scan:
    image: aquasec/trivy:0.48.0
    container_name: gtcx-test-security
    volumes:
      - ../:/app
      - trivy_cache:/root/.cache/trivy
    working_dir: /app
    command:
      ['fs', '--exit-code', '1', '--severity', 'HIGH,CRITICAL', '--scanners', 'vuln,secret', '.']
    networks:
      - gtcx-test-network

  # SBOM generation (per AUDITABLE principle)
  sbom:
    image: anchore/syft:v0.98.0
    container_name: gtcx-test-sbom
    volumes:
      - ../:/app
    working_dir: /app
    command: ['/app', '-o', 'spdx-json=/app/sbom.json']
    networks:
      - gtcx-test-network

# =============================================================================
# NETWORKS
# =============================================================================

networks:
  gtcx-test-network:
    driver: bridge
    name: gtcx-test-network

# =============================================================================
# VOLUMES (Caches for faster CI)
# =============================================================================

volumes:
  trivy_cache:
    name: gtcx-test-trivy-cache
