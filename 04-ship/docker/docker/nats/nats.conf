# =============================================================================
# GTCX NATS Configuration — Local Development
# =============================================================================
# Cross-service event bus with JetStream persistence.
#
# Streams (created by services on first connect):
#   GTCX_EVENTS — All domain events (trade, clearance, settlement, compliance)
#   GTCX_AUDIT  — Audit trail events (append-only, long retention)
#
# Subject hierarchy:
#   gtcx.events.{aggregate}.{action}
#
# Protocol events (typed schemas in @gtcx/types):
#   gtcx.events.TradePass.issued    — credential issued to subject
#   gtcx.events.TradePass.revoked   — credential revoked
#   gtcx.events.TradePass.expired   — credential expired
#   gtcx.events.GeoTag.recorded     — location claim recorded for lot
#   gtcx.events.GeoTag.verified     — location claim cross-verified
#   gtcx.events.GeoTag.disputed     — location claim disputed
#   gtcx.events.GCI.scored          — GCI score computed for subject
#   gtcx.events.GCI.updated         — GCI score recalculated
#   gtcx.events.GCI.expired         — GCI score expired
#
# Trading events:
#   gtcx.events.Trade.EXECUTED
#   gtcx.events.ExportClearance.ISSUED
#   gtcx.events.Permit.APPROVED
#   gtcx.events.WorkProof.CREATED
# =============================================================================

server_name: gtcx-nats-dev

# Client connections
port: 4222
max_payload: 1MB
max_connections: 1024

# Monitoring
http_port: 8222

# JetStream — persistent event streams
jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 5GB
}

# Cluster routing (single node in dev, multi-node in production)
cluster {
  name: gtcx-events
  port: 6222
}

# =============================================================================
# Authentication — account-based isolation
# =============================================================================
# Each service gets its own user with scoped publish/subscribe permissions.
# Passwords below are bcrypt hashes for local development only.
# Production: use NATS NKeys or JWT-based auth from nats-account-server.
#
# Generate bcrypt hash: nats server passwd
# =============================================================================

accounts {
  # Platform services (AGX, CRX, SGX) — publish trade/clearance/permit events
  platform {
    users: [
      {
        user: platform
        # dev password: "platform-dev-secret" — override via NATS_PLATFORM_PASS in production
        password: "$2a$11$QGpMRm5f5r7E5f5f5f5f5ePlaceholderHashForDevOnly000000000"
        permissions {
          publish: ["gtcx.events.Trade.>", "gtcx.events.ExportClearance.>", "gtcx.events.Permit.>", "gtcx.events.WorkProof.>"]
          subscribe: ["gtcx.events.>"]
        }
      }
    ]
  }

  # Protocol services — publish protocol events (TradePass, GeoTag, GCI)
  protocols {
    users: [
      {
        user: protocols
        password: "$2a$11$QGpMRm5f5r7E5f5f5f5f5ePlaceholderHashForDevOnly000000001"
        permissions {
          publish: ["gtcx.events.TradePass.>", "gtcx.events.GeoTag.>", "gtcx.events.GCI.>", "gtcx.events.VaultMark.>", "gtcx.events.PvP.>", "gtcx.events.PANX.>"]
          subscribe: ["gtcx.events.>"]
        }
      }
    ]
  }

  # Intelligence services (ANISA, Sentinel, Cortex) — subscribe to all, publish analytics
  intelligence {
    users: [
      {
        user: intelligence
        password: "$2a$11$QGpMRm5f5r7E5f5f5f5f5ePlaceholderHashForDevOnly000000002"
        permissions {
          publish: ["gtcx.events.Intelligence.>", "gtcx.events.Screening.>"]
          subscribe: ["gtcx.events.>"]
        }
      }
    ]
  }

  # Audit consumer — subscribe only, no publish (append-only audit trail)
  audit {
    users: [
      {
        user: audit
        password: "$2a$11$QGpMRm5f5r7E5f5f5f5f5ePlaceholderHashForDevOnly000000003"
        permissions {
          subscribe: ["gtcx.events.>"]
        }
      }
    ]
  }

  # Monitoring — read-only access to system subjects
  monitoring {
    users: [
      {
        user: monitoring
        password: "$2a$11$QGpMRm5f5r7E5f5f5f5f5ePlaceholderHashForDevOnly000000004"
        permissions {
          subscribe: ["$SYS.>"]
        }
      }
    ]
  }
}

# =============================================================================
# TLS — enabled in staging/production, optional in development
# =============================================================================
# To enable TLS in development:
#   1. Generate certs: infra/scripts/setup.sh --generate-nats-certs
#   2. Mount certs volume in docker-compose.dev.yml
#   3. Uncomment the block below
#
# Production: certs provisioned via cert-manager and mounted as K8s secrets.
# See: infra/kubernetes/base/services/nats.yaml
# =============================================================================
# tls {
#   cert_file: /etc/nats/certs/tls.crt
#   key_file: /etc/nats/certs/tls.key
#   ca_file: /etc/nats/certs/ca.crt
#   verify: true
# }

# Logging
logtime: true
debug: false
trace: false
