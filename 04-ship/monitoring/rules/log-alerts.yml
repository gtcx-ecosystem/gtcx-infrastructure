# =============================================================================
# Log-Based Alerting Rules — GTCX
# =============================================================================
# These rules depend on Loki being available as a Prometheus-compatible
# datasource (via loki-ruler or Grafana Alerting).
# =============================================================================
groups:
  - name: log_based_alerts
    rules:
      - alert: HighErrorLogRate
        expr: |
          sum(rate({namespace=~"gtcx-(production|staging)"} |= "level=error" [5m])) by (app) > 0.1
        for: 5m
        labels:
          severity: warning
          source: logs
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/high-error-log-rate.md'
          summary: 'High error log rate for {{ $labels.app }}'
          description: 'Error log rate is {{ $value | humanizePercentage }} per second over the last 5 minutes'

      - alert: AuthFailureSpike
        expr: |
          sum(rate({namespace=~"gtcx-(production|staging)"} |= "event=auth_failure" [5m])) by (app) > 0.05
        for: 5m
        labels:
          severity: critical
          source: logs
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/auth-failure-spike.md'
          summary: 'Authentication failure spike on {{ $labels.app }}'
          description: 'Auth failure rate is {{ $value | humanizePercentage }} per second — potential attack or misconfiguration'

      - alert: DatabaseConnectionPoolExhausted
        expr: |
          sum(rate({namespace=~"gtcx-(production|staging)"} |= "connection pool exhausted" [5m])) by (app) > 0
        for: 1m
        labels:
          severity: warning
          source: logs
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/database-pool-exhausted.md'
          summary: 'Database connection pool exhausted for {{ $labels.app }}'
          description: 'Connection pool exhaustion detected — requests may queue or fail'
