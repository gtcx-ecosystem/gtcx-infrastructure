# =============================================================================
# Audit Trust Alerts — Replay Protection & Audit DB
# =============================================================================
# Monitors the health of the audit append path and replay-protection
# subsystem. Fires on audit DB unavailability or sudden event volume drops.
#
# Principles: AUDITABLE (P3), OBSERVABLE (P15)
# =============================================================================

groups:
  - name: audit-trust
    rules:
      - alert: AuditDBWriteFailure
        expr: |
          pg_up{job="gtcx-postgres-audit-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#auditdbwritefailure'
          summary: 'Audit PostgreSQL is down'
          description: 'The audit database (gtcx-postgres-audit) has been unreachable for >1 minute. Replay events may be lost.'

      - alert: AuditEventVolumeDrop
        expr: |
          (
            rate(replay_protection_total[5m])
            > 0
          )
          and
          (
            rate(pg_stat_user_tables_n_tup_ins{relname="replay_events"}[5m])
            == 0
          )
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#auditeventvolumedrop'
          summary: 'Audit event volume dropped'
          description: 'Replay protection is accepting requests but no rows are being inserted into gtcx_audit.replay_events. Check postgres-sink connectivity.'

      - alert: ReplayGuardHighRejectionRate
        expr: |
          (
            sum(rate(replay_protection_total{code!="REPLAY_OK"}[5m]))
            /
            sum(rate(replay_protection_total[5m]))
          ) > 0.25
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#replayguardhighrejectionrate'
          summary: 'High replay rejection rate'
          description: '>25% of replay protection checks are failing. Possible attack, clock skew incident, or mobile client misconfiguration.'

      - alert: ReplayGuardClockSkewHigh
        expr: |
          histogram_quantile(0.99,
            rate(replay_protection_clock_skew_ms_bucket[5m])
          ) > 300000
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#replayguardclockskewhigh'
          summary: 'P99 clock skew > 5 minutes'
          description: 'Devices are showing significant clock drift. Investigate NTP configuration on mobile fleet.'
