# =============================================================================
# GTCX Protocol Server — Prometheus Alerting Rules
# =============================================================================
# Thresholds aligned with monitoring runbook:
#   01-docs/2-docs/4-operations/runbooks/monitoring.md
# =============================================================================

groups:
  - name: gtcx-protocols
    rules:
      # P1: Protocol handler error rate > 5% for 5 minutes
      - alert: ProtocolHighErrorRate
        expr: >
          sum(rate(gtcx_protocol_errors_total[5m])) by (protocol)
          /
          sum(rate(gtcx_protocol_requests_total[5m])) by (protocol)
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#protocolhigherrorrate'
          summary: 'Protocol {{ $labels.protocol }} error rate above 5%'
          description: '{{ $labels.protocol }} has {{ $value | humanizePercentage }} error rate over the last 5 minutes.'
          runbook: '01-docs/2-docs/4-operations/runbooks/incident-response.md'

      # P2: Protocol handler latency p99 > 2 seconds
      - alert: ProtocolHighLatency
        expr: >
          (
            sum(rate(gtcx_protocol_latency_ms_sum[5m])) by (protocol)
            /
            sum(rate(gtcx_protocol_latency_ms_count[5m])) by (protocol)
          ) > 2000
        for: 5m
        labels:
          severity: warning
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#protocolhighlatency'
          summary: 'Protocol {{ $labels.protocol }} average latency above 2s'
          description: '{{ $labels.protocol }} average latency is {{ $value | humanizeDuration }}.'

      # P1: Protocol server down (health check failing)
      - alert: ProtocolServerDown
        expr: up{job="gtcx-protocols"} == 0
        for: 1m
        labels:
          severity: critical
          team: infrastructure
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#protocolserverdown'
          summary: 'GTCX Protocol Server is down'
          description: 'Protocol server health check has been failing for 1 minute.'
          runbook: '01-docs/2-docs/4-operations/runbooks/disaster-recovery.md'

      # P2: Rate limiting triggered > 10 rejections per minute
      - alert: ProtocolRateLimitTriggered
        expr: sum(rate(gtcx_protocol_requests_total{protocol="server",operation="rateLimit"}[5m])) * 60 > 10
        for: 2m
        labels:
          severity: warning
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#protocolratelimittriggered'
          summary: 'Rate limiting active — > 10 rejections/min'
          description: '{{ $value }} rate limit rejections per minute. May indicate abuse or misconfigured client.'

      # P2: No requests for 10 minutes (possible connectivity issue)
      - alert: ProtocolNoTraffic
        expr: sum(rate(gtcx_protocol_requests_total[10m])) == 0
        for: 10m
        labels:
          severity: warning
          team: infrastructure
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#protocolnotraffic'
          summary: 'No protocol traffic for 10 minutes'
          description: 'Protocol server is up but receiving zero requests. Check load balancer, DNS, or upstream services.'

      # P1: Proof assembly failures > 3 in 5 minutes
      - alert: LotProofAssemblyFailures
        expr: sum(rate(gtcx_protocol_errors_total{protocol="proof",operation="assembleLotProof"}[5m])) * 300 > 3
        for: 2m
        labels:
          severity: critical
          team: engineering
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/alerts.md#lotproofassemblyfailures'
          summary: 'VerifiedLotProof assembly failing'
          description: '{{ $value }} lot proof assembly failures in the last 5 minutes. Check protocol store connectivity.'
