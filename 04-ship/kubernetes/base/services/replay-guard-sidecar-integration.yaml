# =============================================================================
# Replay Guard Sidecar Integration — gtcx-agx
# =============================================================================
# This patch adds the replay-guard as a sidecar container to the gtcx-agx
# (API gateway) pods. The agx container calls localhost:8400/v1/replay/verify
# for every authenticated request that carries X-GTCX-* integrity headers.
#
# Integration options (choose ONE):
#   1. Sidecar (below) — fastest, no network hop, scales with agx
#   2. Standalone service — shared across multiple consumers, independent scaling
#   3. NGINX auth_request — ingress-level enforcement before traffic hits agx
#
# To apply this patch:
#   kustomize build 04-ship/kubernetes/overlays/production | kubectl apply -f -
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-agx
  namespace: gtcx
spec:
  template:
    spec:
      containers:
        - name: replay-guard
          image: gtcx/replay-guard:v0.1.0
          imagePullPolicy: Always
          ports:
            - name: replay-http
              containerPort: 8400
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '8400'
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: gtcx-replay-guard-redis
                  key: url
            - name: NONCE_TTL_MS
              value: '900000'
            - name: CLOCK_SKEW_WINDOW_MS
              value: '300000'
            - name: LOW_CONN_BUFFER_MS
              value: '600000'
            - name: MAX_FUTURE_MS
              value: '120000'
            - name: OTLP_ENDPOINT
              value: 'http://gtcx-otel-collector.monitoring:4318/v1/metrics'
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: replay-http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: replay-http
            initialDelaySeconds: 2
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 5']
---
# =============================================================================
# NGINX Ingress auth_request integration (alternative to sidecar)
# =============================================================================
# Add these annotations to the gtcx-ingress to enforce replay protection
# at the ingress layer BEFORE requests reach the API:
#
#   nginx.ingress.kubernetes.io/auth-url: http://gtcx-replay-guard.gtcx:8400/v1/replay/verify
#   nginx.ingress.kubernetes.io/auth-cache-key: $cookie_session
#   nginx.ingress.kubernetes.io/auth-response-headers: X-GTCX-Replay-Allowed,X-Request-ID
#
# When auth_request returns 200, NGINX forwards to the backend.
# When auth_request returns 401, NGINX returns 401 to the client.
# =============================================================================
