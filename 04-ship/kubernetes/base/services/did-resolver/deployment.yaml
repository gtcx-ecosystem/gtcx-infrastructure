apiVersion: apps/v1
kind: Deployment
metadata:
  name: did-resolver
  namespace: gtcx-staging
  labels:
    app: did-resolver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: did-resolver
  template:
    metadata:
      labels:
        app: did-resolver
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: did-documents
              mountPath: /usr/share/nginx/html/v1/tradepass
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-logs
              mountPath: /var/log/nginx
          resources:
            requests:
              memory: '16Mi'
              cpu: '10m'
            limits:
              memory: '64Mi'
              cpu: '100m'
      volumes:
        - name: did-documents
          configMap:
            name: did-documents
        - name: nginx-config
          configMap:
            name: did-resolver-config
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
