# =============================================================================
# Compliance Gateway — HorizontalPodAutoscaler
# =============================================================================
# Scales on Prometheus custom metrics:
#   - in-flight /v1/query requests per pod
#   - p95 latency (stay under 5s)
#   - queue depth (stay under 100)
# Falls back to CPU when the metrics adapter is unavailable.
#
# Floor:   1 pod
# Ceiling: 8 pods (revisit when crossing 1000 req/s sustained)
# Target:  20 in-flight queries per pod, p95 latency stays under 5s under load
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: compliance-gateway
  namespace: gtcx
  labels:
    app.kubernetes.io/name: compliance-gateway
    app.kubernetes.io/component: gateway
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: compliance-gateway
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Pods
      pods:
        metric:
          name: compliance_gateway_inflight_requests
        target:
          type: AverageValue
          averageValue: '20'
    - type: Pods
      pods:
        metric:
          name: compliance_gateway_latency_p95_ms
        target:
          type: AverageValue
          averageValue: '5000'
    - type: Pods
      pods:
        metric:
          name: compliance_gateway_queue_depth
        target:
          type: AverageValue
          averageValue: '100'
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
    scaleDown:
      # Slow scale-down protects the in-memory audit chain from being
      # truncated more aggressively than the WORM flush sidecar can
      # checkpoint.
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
      selectPolicy: Min
