# =============================================================================
# GTCX Sovereign Platform — Base Deployment + Service
# =============================================================================
# NestJS-based sovereign commodity exchange platform.
# Global prefix: /api (health at /api/health)
# Port: 3001
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign
  namespace: gtcx
  labels:
    app: sovereign
    tier: platform
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: sovereign
  template:
    metadata:
      labels:
        app: sovereign
        tier: platform
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3001'
        prometheus.io/path: /api/metrics
    spec:
      serviceAccountName: gtcx-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: sovereign
          image: gtcx/sovereign:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: '3001'
            - name: NODE_ENV
              value: production
          envFrom:
            - configMapRef:
                name: gtcx-base-config
            - secretRef:
                name: gtcx-secrets
          resources:
            requests:
              cpu: '200m'
              memory: '512Mi'
            limits:
              cpu: '1000m'
              memory: '1Gi'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 15']
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: sovereign
  namespace: gtcx
  labels:
    app: sovereign
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  selector:
    app: sovereign
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: sovereign
  namespace: gtcx
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: sovereign
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sovereign
  namespace: gtcx
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sovereign
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
