# =============================================================================
# Vault TLS Certificate (cert-manager)
# =============================================================================
# Provisions a TLS certificate for Vault internal communication.
# Mounted into Vault pods via the Terraform vault module's extraVolumes.
#
# Security: Uses the gtcx-selfsigned ClusterIssuer for internal cluster TLS.
# For production with external trust, migrate to a private CA or public ACME.
# =============================================================================

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server-tls
  namespace: vault
spec:
  secretName: vault-server-tls
  duration: 8760h
  renewBefore: 720h
  isCA: false
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  dnsNames:
    - vault
    - vault.vault
    - vault.vault.svc
    - vault.vault.svc.cluster.local
    - '*.vault.vault.svc.cluster.local'
    - '*.vault-internal'
    - '*.vault-internal.vault.svc.cluster.local'
  issuerRef:
    name: gtcx-selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
