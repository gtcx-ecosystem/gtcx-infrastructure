# =============================================================================
# Anomaly Detector — Periodic Scan (CronJob)
# =============================================================================
# The anomaly detector evaluates rules and exits (batch design).
# CronJob is the correct abstraction for this workload.
# =============================================================================

apiVersion: batch/v1
kind: CronJob
metadata:
  name: anomaly-detector
  namespace: gtcx
  labels:
    app: anomaly-detector
    version: v1
spec:
  schedule: '*/5 * * * *'
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    metadata:
      labels:
        app: anomaly-detector
        version: v1
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: anomaly-detector
            version: v1
            gtcx.trade/data-classification: internal
        spec:
          serviceAccountName: anomaly-detector
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            fsGroup: 1000
          restartPolicy: OnFailure
          containers:
            - name: detector
              image: '348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-anomaly-detector:v0.1.0'
              imagePullPolicy: Always
              env:
                - name: PROMETHEUS_URL
                  value: 'http://prometheus.monitoring.svc.cluster.local:9090'
                - name: NODE_ENV
                  value: 'production'
                - name: ROLLBACK_STATE_PATH
                  value: '/tmp/anomaly-detector-last-rollback'
              args:
                - node
                - detector.mjs
                - '--threshold=10'
                - '--window=300000'
                - '--rollback-target=gtcx-compliance-gateway'
                - '--rollback-cooldown=900000'
              resources:
                requests:
                  memory: '64Mi'
                  cpu: '50m'
                limits:
                  memory: '128Mi'
                  cpu: '100m'
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
---
# Service for Prometheus scraping (if metrics are exposed)
apiVersion: v1
kind: Service
metadata:
  name: anomaly-detector
  namespace: gtcx
spec:
  selector:
    app: anomaly-detector
  ports:
    - port: 9090
      targetPort: 9090
