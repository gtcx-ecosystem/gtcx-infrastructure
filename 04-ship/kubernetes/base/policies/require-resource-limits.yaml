# =============================================================================
# Kyverno Policy — Require Resource Limits
# =============================================================================
# Ensures every container defines CPU and memory requests/limits.
# Prevents noisy-neighbor issues and enables proper scheduling.
#
# Install prerequisite:
#   helm install kyverno kyverno/kyverno -n kyverno --create-namespace
# =============================================================================
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: 'Require Resource Limits'
    policies.kyverno.io/category: 'Best Practices'
    policies.kyverno.io/severity: 'medium'
    policies.kyverno.io/subject: 'Pod'
    policies.kyverno.io/description: >-
      Resource limits prevent a single container from consuming all node resources.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: validate-resources
      match:
        resources:
          kinds:
            - Pod
          namespaces:
            - gtcx-production
            - gtcx-staging
      validate:
        message: 'CPU and memory requests/limits are required for all containers.'
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    memory: '?*'
                    cpu: '?*'
                  limits:
                    memory: '?*'
                    cpu: '?*'
