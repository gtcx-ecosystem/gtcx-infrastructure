# =============================================================================
# SLO Error Budget Burn Rate Alerts
# =============================================================================
# Multi-window burn rate alerting per Google SRE handbook.
# Uses recording rules from 04-ship/monitoring/rules/slo-recording-rules.yml.
#
# Thresholds:
#   14.4x burn rate (1h window) — exhausts 30-day budget in 2 days → PAGE
#   6x burn rate (6h window)   — exhausts budget in 5 days → TICKET
#   1x burn rate (3d window)   — on track to exhaust budget → REVIEW
#
# Error budgets:
#   AGX/Protocols: 0.5% (99.5% SLO)
#   ANISA:         1.0% (99.0% SLO)
#   Crypto:        0.1% (99.9% SLO)
# =============================================================================
groups:
  - name: slo.burn_rate_alerts
    rules:
      # =======================================================================
      # AGX — 99.5% SLO (0.005 error budget)
      # =======================================================================
      - alert: AGXErrorBudgetFastBurn
        expr: slo:agx:error_budget:burn_rate_1h > 14.4
        for: 5m
        labels:
          severity: critical
          service: gtcx-agx
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/agx-error-budget.md'
          summary: 'AGX burning error budget 14.4x faster than sustainable'
          description: 'At current rate, 30-day error budget exhausted in ~2 days. 1h burn rate: {{ $value | printf "%.1f" }}x'

      - alert: AGXErrorBudgetSlowBurn
        expr: slo:agx:error_budget:burn_rate_6h > 6
        for: 30m
        labels:
          severity: warning
          service: gtcx-agx
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/agx-error-budget.md'
          summary: 'AGX burning error budget 6x faster than sustainable'
          description: '6h burn rate: {{ $value | printf "%.1f" }}x — budget exhausted in ~5 days at this rate'

      # =======================================================================
      # Protocols — 99.5% SLO (0.005 error budget)
      # =======================================================================
      - alert: ProtocolsErrorBudgetFastBurn
        expr: slo:protocols:error_budget:burn_rate_1h > 14.4
        for: 5m
        labels:
          severity: critical
          service: gtcx-protocols
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/protocols-error-budget.md'
          summary: 'Protocols burning error budget 14.4x faster than sustainable'
          description: '1h burn rate: {{ $value | printf "%.1f" }}x — page immediately'

      - alert: ProtocolsErrorBudgetSlowBurn
        expr: >
          (
            1 - (
              sum(rate(http_requests_total{service="gtcx-protocols", code!~"5.."}[6h]))
              /
              sum(rate(http_requests_total{service="gtcx-protocols"}[6h]))
            ) / 0.005
          ) > 6
        for: 30m
        labels:
          severity: warning
          service: gtcx-protocols
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/protocols-error-budget.md'
          summary: 'Protocols burning error budget 6x — create ticket'

      # =======================================================================
      # ANISA — 99.0% SLO (0.01 error budget)
      # =======================================================================
      - alert: ANISAErrorBudgetFastBurn
        expr: slo:anisa:error_budget:burn_rate_1h > 14.4
        for: 5m
        labels:
          severity: critical
          service: anisa
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/anisa-error-budget.md'
          summary: 'ANISA burning error budget 14.4x faster than sustainable'
          description: '1h burn rate: {{ $value | printf "%.1f" }}x — AI service degradation'

      - alert: ANISAErrorBudgetSlowBurn
        expr: >
          (
            1 - (
              sum(rate(http_requests_total{service="anisa", code!~"5.."}[6h]))
              /
              sum(rate(http_requests_total{service="anisa"}[6h]))
            ) / 0.01
          ) > 6
        for: 30m
        labels:
          severity: warning
          service: anisa
          slo: availability
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/anisa-error-budget.md'
          summary: 'ANISA burning error budget 6x — intelligence quality at risk'

      # =======================================================================
      # Latency SLO violations
      # =======================================================================
      - alert: AGXLatencySLOBreach
        expr: slo:agx:latency:p95_5m > 0.5
        for: 10m
        labels:
          severity: warning
          service: gtcx-agx
          slo: latency
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/latency-slo-breach.md'
          summary: 'AGX p95 latency above 500ms SLO target'
          description: 'P95 latency is {{ $value | printf "%.0f" }}ms'

      - alert: ProtocolsLatencySLOBreach
        expr: slo:protocols:latency:p95_5m > 0.5
        for: 10m
        labels:
          severity: warning
          service: gtcx-protocols
          slo: latency
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/latency-slo-breach.md'
          summary: 'Protocols p95 latency above 500ms SLO target'

      - alert: ANISALatencySLOBreach
        expr: slo:anisa:latency:p95_5m > 2.0
        for: 10m
        labels:
          severity: warning
          service: anisa
          slo: latency
        annotations:
          runbook_url: 'https://github.com/gtcx-ecosystem/gtcx-infrastructure/blob/main/01-docs/04-ops/runbooks/latency-slo-breach.md'
          summary: 'ANISA p95 latency above 2000ms SLO target'
