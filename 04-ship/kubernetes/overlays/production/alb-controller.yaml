# =============================================================================
# AWS Load Balancer Controller — Helm Values
# =============================================================================
# Deployed via: helm install aws-load-balancer-controller \
#   eks/aws-load-balancer-controller \
#   -n kube-system \
#   -f alb-controller.yaml
#
# Prerequisite: IAM role created by Terraform (module.eks.alb_controller_role_arn)
#
# Per SECURE (11): WAF integration, TLS termination at ALB
# Per RESILIENT (12): Multi-AZ ALB targets, health check routing
# Per SOVEREIGN (6): Deployed in-region (af-south-1 for Zimbabwe pilot)
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: alb-controller-values
  namespace: kube-system
  labels:
    app.kubernetes.io/name: aws-load-balancer-controller
    app.kubernetes.io/part-of: gtcx
data:
  values.yaml: |
    clusterName: ${CLUSTER_NAME}
    region: ${AWS_REGION}
    vpcId: ${VPC_ID}
    serviceAccount:
      create: true
      name: aws-load-balancer-controller
      annotations:
        eks.amazonaws.com/role-arn: ${ALB_CONTROLLER_ROLE_ARN}
    replicaCount: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi
    enableShield: false
    enableWaf: false
    enableWafv2: true
    logLevel: info
    ingressClass: alb
    defaultTargetType: ip

---
# =============================================================================
# IngressClass for AWS ALB
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
  annotations:
    ingressclass.kubernetes.io/is-default-class: 'false'
spec:
  controller: ingress.k8s.aws/alb
