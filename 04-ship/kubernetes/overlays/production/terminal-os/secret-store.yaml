apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: terminal-os-aws-secrets
  namespace: terminal-os-production
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: terminal-os
    environment: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: terminal-os-sa
