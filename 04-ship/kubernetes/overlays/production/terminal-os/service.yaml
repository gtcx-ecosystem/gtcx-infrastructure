apiVersion: v1
kind: Service
metadata:
  name: terminal-os
  namespace: terminal-os-production
  labels:
    app: terminal-os
    tier: frontend
    environment: production
spec:
  type: ClusterIP
  selector:
    app: terminal-os
    environment: production
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
