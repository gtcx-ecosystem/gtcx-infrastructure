# =============================================================================
# Production Overlay
# =============================================================================
# SOVEREIGN (6): This configuration is for government-grade deployment
# SECURE (11): Maximum security posture
# RESILIENT (12): High availability configuration
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: gtcx-production

resources:
  - ../../base
  - ../../base/policies
  - network-policies.yaml
  - pod-security-policy.yaml
  - ingress.yaml
  - alb-controller.yaml
  - alb-ingress.yaml

nameSuffix: -prod

labels:
  - includeSelectors: true
    pairs:
      environment: production

commonAnnotations:
  deployment.kubernetes.io/revision: '1'

configMapGenerator:
  - name: gtcx-env
    behavior: merge
    literals:
      - GTCX_LOG_LEVEL=warn
      - NODE_ENV=production
      - GTCX_FEATURE_FEDERATION=true

# Production secrets managed externally (Vault/Sealed Secrets)
# Not generated here - injected via GitOps

# IMAGE TAG POLICY (production overlay)
# ---------------------------------------------------------------------------
# Tags below are PLACEHOLDERS. `04-ship/03-platform/scripts/deploy.sh` (lines 357-358)
# rewrites them at runtime via `kustomize edit set image` to the actual
# ECR URI + 40-char commit SHA for the release being deployed.
#
# Anyone running `kubectl apply -k overlays/production/` directly from
# git WITHOUT going through deploy.sh will get an ImagePullBackOff
# because PLACEHOLDER-RUN-DEPLOY-SH is not a real tag — fail-safe, not
# silent-wrong-version.
#
# The 03-platform/tools/03-platform/scripts/production-overlay-guard.mjs check (wired into
# pnpm test) refuses to merge a commit whose production overlay
# carries a version-shaped tag like `v1.0.0` (which previously LOOKED
# real but was decorative; kubectl apply would try to pull a
# non-existent image OR — worse — silently pull `latest` if a
# malicious push landed at gtcx/agx:v1.0.0 in a public registry).
# ---------------------------------------------------------------------------
images:
  - name: gtcx/agx
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-agx
    newTag: 'PLACEHOLDER-RUN-DEPLOY-SH'
  - name: gtcx/protocols
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-protocols
    newTag: 'PLACEHOLDER-RUN-DEPLOY-SH'
  # Anomaly detector — pinned to verified SHA (built 2026-05-12)
  # SHA: 77dda36431624c4f537d8650a1910a4180f7fc1d
  - name: gtcx-anomaly-detector
    newName: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-anomaly-detector
    newTag: '77dda36431624c4f537d8650a1910a4180f7fc1d'

# Production resource configuration
patches:
  # Compliance Gateway — Redis nonce store URL + feature flags
  - target:
      kind: Deployment
      name: compliance-gateway
    path: patches/compliance-gateway-env.yaml
  # NOTE: audit-flush is intentionally not patched here while the base
  # resource remains disabled for AMD64 clusters. Re-enable the base resource
  # and this overlay together when an AMD64 image is available.
  # - path: audit-flush-patch.yaml

  # API service - production resources
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2000m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
    target:
      kind: Deployment
      name: gtcx-agx

  # HPA - production scaling
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
    target:
      kind: HorizontalPodAutoscaler
      name: gtcx-agx

  # PDB - production availability
  - patch: |-
      - op: replace
        path: /spec/minAvailable
        value: 2
    target:
      kind: PodDisruptionBudget
      name: gtcx-agx

  # NetworkPolicy — per-environment database subnet CIDR
  - target:
      kind: NetworkPolicy
      name: gtcx-agx-policy
    path: patches/agx-db-cidr.yaml
  - target:
      kind: NetworkPolicy
      name: gtcx-ecosystem-policy
    path: patches/ecosystem-db-cidr.yaml

  # Platform service account — enable token projection for IRSA.
  # automountServiceAccountToken is false in base; set true in production so the
  # EKS-projected OIDC token is available for STS AssumeRoleWithWebIdentity.
  # The eks.amazonaws.com/role-arn annotation is applied post-Terraform-apply by:
  #   ENVIRONMENT=zimbabwe-pilot ./04-ship/03-platform/scripts/apply-platform-irsa.sh
  # ARN source: terraform output kyc_documents_irsa_role_arn
  - patch: |-
      - op: replace
        path: /automountServiceAccountToken
        value: true
    target:
      kind: ServiceAccount
      name: gtcx-platform
