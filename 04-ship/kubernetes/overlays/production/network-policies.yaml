# =============================================================================
# Production Network Policies
# =============================================================================
# Per SECURE (11): Defense in depth, principle of least privilege
# =============================================================================

# Default deny all ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: gtcx-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Default deny all egress (except DNS)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: gtcx-production
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# API service network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gtcx-agx-policy
  namespace: gtcx-production
spec:
  podSelector:
    matchLabels:
      app: gtcx-agx-prod
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow to protocol services
    - to:
        - podSelector:
            matchLabels:
              tier: protocol
      ports:
        - protocol: TCP
          port: 3000
    # Allow to database (RDS in database subnets)
    # Per-environment patch: replace with your VPC database subnet range.
    - to:
        - ipBlock:
            cidr: 10.0.128.0/17
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# Protocol services network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gtcx-ecosystem-policy
  namespace: gtcx-production
spec:
  podSelector:
    matchLabels:
      tier: protocol
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API
    - from:
        - podSelector:
            matchLabels:
              app: gtcx-agx-prod
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow to database (RDS in database subnets)
    # Per-environment patch: replace with your VPC database subnet range.
    - to:
        - ipBlock:
            cidr: 10.0.128.0/17
      ports:
        - protocol: TCP
          port: 5432
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# =============================================================================
# Observability Network Policies
# =============================================================================
# Allow Prometheus to scrape app pods in this namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: gtcx-production
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchLabels: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gtcx-monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9187
        - protocol: TCP
          port: 9121
        - protocol: TCP
          port: 9100

---
# Allow app pods to push logs to Loki
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-loki-ingestion
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: loki
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gtcx-production
      ports:
        - protocol: TCP
          port: 3100

---
# Allow app pods to send traces to Jaeger
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-jaeger-ingestion
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gtcx-production
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318

---
# =============================================================================
# Monitoring Namespace — Default Deny
# =============================================================================
# Defense in depth: monitoring stack should not reach production workloads
# except on designated scrape/ingestion ports.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny-ingress
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: monitoring-default-deny-egress
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53

---
# Allow Prometheus to scrape production pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gtcx-production
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8300
        - protocol: TCP
          port: 8200
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9090

---
# Allow Alertmanager to send alerts externally
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager-egress
  namespace: gtcx-monitoring
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: observability
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443

---
# =============================================================================
# gtcx-intelligence Network Policy
# =============================================================================
# AI/ML inference services — ANISA, red-team, trainer, SDK
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gtcx-intelligence-policy
  namespace: gtcx-production
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: intelligence
spec:
  podSelector:
    matchLabels:
      tier: intelligence
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from API gateway
    - from:
        - podSelector:
            matchLabels:
              app: gtcx-agx-prod
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8080
    # Allow from Prometheus (scrape)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: gtcx-monitoring
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9090
        - protocol: TCP
          port: 8080
  egress:
    # Allow to protocol services (data for inference)
    - to:
        - podSelector:
            matchLabels:
              tier: protocol
      ports:
        - protocol: TCP
          port: 3000
    # Allow to external AI APIs (OpenAI, Anthropic, etc.)
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # Allow to database (RDS in database subnets)
    - to:
        - ipBlock:
            cidr: 10.0.128.0/17
      ports:
        - protocol: TCP
          port: 5432
    # Allow to Redis (ElastiCache in database subnets)
    - to:
        - ipBlock:
            cidr: 10.0.128.0/17
      ports:
        - protocol: TCP
          port: 6379
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
