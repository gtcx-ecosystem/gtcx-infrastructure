# =============================================================================
# terminal-os ESO ServiceAccount — IRSA-enabled
# =============================================================================
# Allows External Secrets Operator to assume AWS IAM role and read
# gtcx/terminal-os/staging/* secrets from Secrets Manager.
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terminal-os-sa
  namespace: terminal-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: terminal-os
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-staging-terminal-os-secrets-role
    eks.amazonaws.com/sts-regional-endpoints: 'true'
