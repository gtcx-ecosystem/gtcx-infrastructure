# =============================================================================
# terminal-os-staging — ExternalSecret for API keys
# =============================================================================
# Syncs gtcx/terminal-os/staging/api-keys from AWS SM into K8s secret.
# Expected keys: COMPLIANCE_OS_TERMINAL_API_KEY, AUTH_SECRET, etc.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: terminal-os-secrets
  namespace: terminal-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    app.kubernetes.io/component: terminal-os
    environment: staging
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: terminal-os-aws-secrets
  target:
    name: terminal-os-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - extract:
        key: gtcx/terminal-os/staging/api-keys
