# =============================================================================
# terminal-os — Staging Deployment
# =============================================================================
# Next.js 15 frontend for FIFTY-FOUR intelligence platform.
# Image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-terminal-os
# Port: 3000
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: terminal-os
  namespace: terminal-os-staging
  labels:
    app: terminal-os
    tier: frontend
    environment: staging
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: terminal-os
      environment: staging
  template:
    metadata:
      labels:
        app: terminal-os
        tier: frontend
        environment: staging
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: /api/metrics
    spec:
      serviceAccountName: terminal-os-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 30
      containers:
        - name: terminal-os
          image: 348389439381.dkr.ecr.af-south-1.amazonaws.com/gtcx-terminal-os:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: '3000'
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_APP_URL
              value: https://terminal-staging.gtcx.trade
            - name: NEXT_TELEMETRY_DISABLED
              value: '1'
          envFrom:
            - secretRef:
                name: terminal-os-secrets
                optional: false
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          lifecycle:
            preStop:
              exec:
                command: ['/bin/sh', '-c', 'sleep 15']
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
