# Staging protocols — production NODE_ENV + missing REDIS/DATABASE crash the pod.
# See StubNotAllowedError (InMemoryRateLimitStore) and validateProductionConfig.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gtcx-protocols
spec:
  template:
    spec:
      containers:
        - name: protocols
          env:
            - name: NODE_ENV
              value: staging
            - name: REDIS_URL
              value: redis://redis-staging.gtcx-staging.svc.cluster.local:6379
            - name: GTCX_CSP_ROOT
              value: /app/country-support-packages
            # Until RDS URL is in gtcx-secrets; avoids stub guard on in-memory stores at boot.
            - name: GTCX_ALLOW_STUBS
              value: '1'
            # Override base secret placeholder until RDS URL is in gtcx-secrets.
            - name: DATABASE_URL
              value: ''
            - name: GTCX_AUDIT_STORE
              value: memory
            # Boot-seed staging operator DIDs from bundled fixtures (#60 / 6ef3b423).
            - name: GTCX_STAGING_TRADEPASS_SEED
              value: '1'
            - name: GTCX_STAGING_TRADEPASS_FIXTURES_PATH
              value: server/fixtures/staging-tradepass-operators.json
            # API key for admin/operator registration (Bearer auth).
            - name: GTCX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gtcx-protocols-api-key-staging
                  key: api-key
            - name: GTCX_API_KEY_SCOPES
              value: 'admin:audit,protocol:read,protocol:write'
            # TradePass auth token for Wire #2 evidence submit (INT-S9-01).
            # Optional: pod starts without it; protocols falls back to stub/
            # dev-mode until the secret key is populated.
            - name: TRADEPASS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gtcx-secrets-staging-cdkk972mcc
                  key: TRADEPASS_AUTH_TOKEN
                  optional: true
