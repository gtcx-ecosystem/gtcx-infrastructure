# Patch compliance-gateway deployment to reference the manually-managed
# secret (not the kustomize-generated hash-suffixed one).
# This avoids the PLACEHOLDER_OVERRIDE_IN_OVERLAY value that causes
# audit.signer.keyLoadFailed on pod startup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-gateway
spec:
  template:
    spec:
      containers:
        - name: compliance-gateway
          env:
            - name: AUDIT_SIGNING_KEY_B64
              valueFrom:
                secretKeyRef:
                  name: gtcx-compliance-gateway-audit-key-staging
                  key: AUDIT_SIGNING_KEY_B64
