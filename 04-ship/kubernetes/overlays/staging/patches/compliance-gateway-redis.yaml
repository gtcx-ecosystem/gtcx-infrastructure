# =============================================================================
# Compliance Gateway — Environment patch (staging)
# =============================================================================
# Injects REDIS_URL and feature flags for audit bundles/query.
# nameSuffix (-staging) is applied by the overlay kustomization.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-gateway
  namespace: gtcx
spec:
  template:
    spec:
      containers:
        - name: compliance-gateway
          env:
            - name: REDIS_URL
              value: 'redis://redis-staging.gtcx-staging.svc.cluster.local:6379'
            - name: AUDIT_BUNDLES_ENABLED
              value: '1'
            - name: AUDIT_QUERY_ENABLED
              value: '1'
