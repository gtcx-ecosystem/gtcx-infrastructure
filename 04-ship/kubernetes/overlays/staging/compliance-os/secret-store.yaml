# =============================================================================
# compliance-os-staging — ESO SecretStore + IRSA ServiceAccount
# =============================================================================
# Replaces missing ClusterSecretStore `gtcx-aws-secrets-manager` (Hub #17).
# Prerequisite: IAM role from Terraform module.secrets (compliance-os.tf):
#   arn:aws:iam::<account>:role/gtcx-staging-compliance-os-secrets-role
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: compliance-os-sa
  namespace: compliance-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: staging
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::348389439381:role/gtcx-staging-compliance-os-secrets-role
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: compliance-os-aws-secrets
  namespace: compliance-os-staging
  labels:
    app.kubernetes.io/part-of: gtcx
    environment: staging
spec:
  provider:
    aws:
      service: SecretsManager
      region: af-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: compliance-os-sa
