# =============================================================================
# Pen-Test Overlay — isolated namespace for the 2026 external pen-test.
# =============================================================================
# Contract:
#   - Namespace: gtcx-pen-test
#   - Audit chain isolated to gtcx.audit.pen-test.> JetStream subject
#   - NO writes to the production WORM bucket — separate bucket for the run
#   - Anonymized seed data only (loaded by 04-ship/migrations/seed-pentest.sql)
#   - Resources are intentionally bounded so test traffic cannot consume
#     production capacity if the namespace boundary leaks
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: gtcx-pen-test

namespace: gtcx-pen-test

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: compliance-gateway
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env
        value:
          - { name: NODE_ENV, value: 'production' }
          - { name: PORT, value: '8500' }
          - { name: PROTOCOL_BASE_URL, value: 'http://gtcx-protocols.gtcx-pen-test.svc.cluster.local:8300' }
          - { name: AUDIT_SINK, value: 'nats' }
          - { name: AUDIT_NATS_SUBJECT, value: 'gtcx.audit.pen-test.compliance-gateway' }
          - { name: NATS_URL, value: 'nats://nats.gtcx-pen-test.svc.cluster.local:4222' }
          - { name: AUDIT_CHAIN_MAX_RECORDS, value: '10000' }
          - { name: GTCX_QPS_LIMIT, value: '5' }
          - { name: GTCX_DAILY_BUDGET_USD, value: '1' }
          - name: AUDIT_SIGNING_KEY_B64
            valueFrom:
              secretKeyRef:
                name: gtcx-compliance-gateway-audit-key-pen-test
                key: AUDIT_SIGNING_KEY_B64
          - name: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON
            valueFrom:
              secretKeyRef:
                name: compliance-gateway-secrets
                key: COMPLIANCE_GATEWAY_AUTH_TOKENS_JSON

  # NOTE: audit-flush is intentionally not patched here while the base
  # resource remains disabled for AMD64 clusters. Re-enable the base resource
  # and this overlay together when an AMD64 image is available.

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/environment: pen-test
      gtcx.trade/blast-radius: contained
